  budget_target_usd: "0-20/month"
  budget_status: "Well within target. All active selections land on free tiers; the full $0-20/month budget is unused headroom, available if any free-tier ceiling is approached (most likely candidate: Vercel Pro at $20/seat/month if non-commercial-use or build-concurrency limits ever bind)."

# ---------------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------------
validation:
  research_currency:
    status: confirmed
    note: >
      All researched categories were sourced live on 2026-06-30, the same
      date as this TDR's decision_date — well within the 30-day currency
      requirement. Primary sources (official docs/pricing pages) were
      prioritized over secondary/aggregator content throughout; several
      discrepancies between official docs and third-party aggregator
      claims were identified and flagged in the relevant rationale/caveat
      fields above (e.g. Vercel/Netlify/CircleCI build-minute figures
      circulating on SEO blogs that don't match official docs).
  bias_check:
    status: confirmed
    note: >
      No hardcoded/training-data defaults were used for any researched
      category — every selection cites a live 2026-06-30 source. The two
      categories locked in without research (Nx, pnpm) are explicitly
      labeled human_specified/override_rationale rather than presented as
      researched conclusions.
  compatibility_check:
    status: confirmed
    findings:
      - "Vercel + Nx: natively documented (vercel.com/docs/monorepos/nx), no conflict."
      - "GitHub Actions + Nx: first-party generator support, no conflict."
      - "ESLint + Prettier + Nx: first-party, well-documented Nx ESLint plugin/executor support, no conflict."
      - "MSW v2 WebSocket interception + any frontend framework: framework-agnostic, no conflict."
      - "Node 24 + TypeScript 6.0 + pnpm + Nx 21: standard, widely-used combination as of mid-2026, no known conflicts."
      - "Tailwind v4 CSS-first config + Nx shared-package pattern: documented directly by Nx's own blog, no conflict."
    open_items_for_human_review:
      - "Vercel Hobby's non-commercial-use restriction — confirm this reading is acceptable before relying on it long-term; flagged, not silently assumed fine."
