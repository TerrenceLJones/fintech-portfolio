# ---------------------------------------------------------------------------
# Performance targets — only where meaningful at the platform level
# ---------------------------------------------------------------------------
performance_targets:
  ci_pipeline_duration:
    target: "< 10 minutes for a typical PR build, using nx affected to scope work to changed projects only"
    rationale: "Keeps the GitHub Actions free-tier 2,000 min/month private-repo allowance comfortably unconsumed even with frequent solo iteration."
  vercel_build_duration:
    target: "Well under the 45-minute hard cap per deployment; realistically low single-digit minutes for a frontend-only demo app"
    rationale: "Vercel's Hobby tier hard-caps any single build at 45 minutes; this is a sanity ceiling, not a stretch target."
  lint_format_execution_time:
    target: "Low-single-digit-second to low-double-digit-second full-repo ESLint+Prettier runs, scoped via nx affected for incremental/PR runs"
    rationale: "ESLint 9.34's multithreaded linting (Aug 2025) keeps this acceptable for a solo maintainer despite being slower than Biome; full rule coverage was prioritized over raw speed for this decision, so this is a sanity target rather than the primary justification for the tool choice."
  note: >
    Categories like page load / Core Web Vitals / Time to Interactive are
    intentionally not set at the platform level — they depend on each
    app's specific framework and content and belong in the app-level TDR
    (e.g. TDR-CLEARLINE-001), not here.

