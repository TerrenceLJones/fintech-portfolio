metadata:
  tdr_id: TDR-PLATFORM-001
  epic_id: PLATFORM-001
  decision_scope_level: platform
  title: "fintech-portfolio — Platform Baseline Technology Decisions"
  decision_date: "2026-06-30"
  version: "1.0"
  author: "Technology Strategy Agent"
  research_window: "2026-06-30 (single-day research pass; all sources cited with access dates)"

technology_decision_scope:
  level: platform
  inherits_from: null
  applies_to_apps:
    - clearline-web

# ---------------------------------------------------------------------------
# App registry — not part of the base TDR template, added because this
# platform is explicitly multi-app from day one.
# ---------------------------------------------------------------------------
app_registry:
  - app_slug: clearline-web
    status: planned
    description: "B2B spend management / payments frontend demo. Web-only, no mobile companion. First app in the portfolio; detailed app-level TDR (TDR-CLEARLINE-001) follows this one and inherits from it."

# ---------------------------------------------------------------------------
# Technology decisions
# ---------------------------------------------------------------------------
technology_decisions:
  monorepo_management:
    selected: "Nx"
    version: "21.x (latest stable as of mid-2026)"
    decision_type: human_specified
    override_rationale: >
      Human-specified, not researched. The comparative "Turborepo vs Nx vs
      pnpm-workspaces vs Lerna" evaluation step was explicitly skipped per
      instruction. This is a pre-decided choice, recorded here for
      traceability, not a researched/scored decision.
    rationale: >
      Enables Nx module-boundary enforcement and module federation across
      multiple independent apps as the portfolio grows beyond clearline-web.
      Matches the engineer's existing Nx experience, which lowers solo-
      maintenance risk relative to learning a new tool under deadline
      pressure.
    alternatives_considered: []
    research_sources: []
    known_caveats: >
      Nx deprecated custom task runners in v20 and removed them in v21 —
      this affects third-party Nx+Vercel remote-caching plugins (see
      infrastructure_providers.frontend_hosting) but does not affect core
      Nx/pnpm/module-boundary functionality, which is unaffected. Flag for
      the Clearline app TDR: confirm Nx version pinned in scaffolding is
      v21+ before relying on any caching-plugin guidance written against
      Nx 17–19.

  package_manager:
    selected: "pnpm"
    version: "9.x (latest stable as of mid-2026)"
    decision_type: human_specified
    override_rationale: >
      Human-specified, not researched, paired with the Nx decision above.
    rationale: >
      Standard pairing with Nx for monorepos; efficient disk usage via
      content-addressable store, strict dependency isolation (reduces
      phantom-dependency bugs across independent apps), and is the
      package manager assumed by Nx's own current documentation/recipes
      (e.g. Vercel and Cloudflare Pages monorepo deploy guides).
    alternatives_considered: []
    research_sources: []

  typescript_version:
    selected: "TypeScript 6.0"
    version: "6.0.3 (latest patch as of research date)"
    decision_type: researched
    rationale: >
      6.0 is the current stable release and is explicitly positioned by the
      TypeScript team as a "stepping-stone" release — the last version on
      the classic JS-hosted compiler before the 7.0 Go-ported compiler
      ("Project Corsa"). Pinning to 6.0.x now gives a stable, fully-tooled
      baseline; TypeScript 7.0 (in Release Candidate as of this research,
      claiming ~10x faster type-checking) is not yet GA and should be
      tracked as a near-term upgrade rather than adopted today. Adopting
      the new `--stableTypeOrdering` flag now is recommended to ease a
      future 6→7 migration.
    alternatives_considered:
      - option: "TypeScript 7.0 (Release Candidate)"
        rejected_because: "Not GA at time of decision; adopting an RC compiler as the platform baseline is unnecessary risk for a solo-maintained project with no urgency to be on the bleeding edge."
      - option: "TypeScript 5.x (prior major)"
        rejected_because: "Superseded by 6.0; no reason to start a greenfield project one major version behind current stable."
    research_sources:
      - url: "https://devblogs.microsoft.com/typescript/announcing-typescript-6-0/"
        note: "Official 6.0 announcement, confirms 'stepping-stone' framing and module-resolution deprecations. Accessed 2026-06-30."
      - url: "https://devblogs.microsoft.com/typescript/typescript-native-port/"
        note: "TypeScript 7 / native Go port performance claims (~10x faster). Accessed 2026-06-30."
      - url: "https://www.npmjs.com/package/typescript"
        note: "Confirmed 6.0.3 as latest dist-tag, published 2026-04-16; 7.0.1-rc also published. Accessed 2026-06-30."

  nodejs_version:
    selected: 'Node.js 24 ("Krypton")'
    version: "24.x — current Active LTS"
    decision_type: researched
    rationale: >
      Node 24 has been Active LTS since 2025-10-28 and remains in Active
      LTS until 2026-10-20 (Maintenance LTS through EOL 2028-04-30) — the
      correct baseline for a new project starting now. Node 26 entered
      "Current" status in May 2026 but won't reach Active LTS until late
      October 2026, making it premature for a baseline today.
    alternatives_considered:
      - option: 'Node.js 22 ("Jod")'
        rejected_because: "Now in Maintenance LTS (since 2025-10-21); offers no advantage over 24 for a greenfield project and has a shorter remaining support runway."
      - option: 'Node.js 26 ("Current")'
        rejected_because: "Not yet Active LTS as of decision date (won't be until ~2026-10-28); too new for a baseline meant to be stable across multiple apps."
    research_sources:
      - url: "https://github.com/nodejs/Release"
        note: "Official Node.js release schedule (Release working group). Confirmed Node 24 Active LTS window and Node 22/26 status. Accessed 2026-06-30."

  linter_formatter:
    selected: "ESLint + Prettier"
    version: "ESLint 9.x (flat config) + Prettier 3.x — latest stable as of research date"
    decision_type: researched
    rationale: >
      Selected over Biome v2 specifically because research surfaced real,
      current (2025–2026) coverage and tooling gaps in Biome that matter
      for a Nx/pnpm monorepo hosting React/TypeScript frontends: there is
      no official `@nx/biome` plugin (Nx's own blog frames Biome support
      as a 20-minute manual-wiring exercise rather than first-party
      tooling, and Nx's 2026 roadmap is actually investing engineering
      effort in oxlint instead, explicitly calling Biome a tool they're
      only "watching"); Biome's type-aware linting (`noFloatingPromises`
      etc.) catches roughly 75–85% of what typescript-eslint catches via
      full type information, by Biome's own admission; and framework-
      specific rule coverage is thin — only ~5 of
      `@next/eslint-plugin-next`'s rules are mapped, and React Compiler
      lint rules are unimplemented as of this research. Documented
      production teams on Hacker News and dev blogs report real friction
      from adopting Biome outright (CI linting breakage, JSX/TSX rule
      gaps, import-sort bugs), commonly landing on hybrid setups rather
      than a full swap — which would mean carrying two lint tools' setup
      and config burden anyway.

      ESLint + Prettier remains the safer, most battle-tested default:
      full rule coverage (including Next.js-specific and type-aware rules
      via typescript-eslint), first-party Nx support
      (`nx g ci-workflow`, well-documented Nx ESLint plugin/executor), and
      no framework-coverage gaps to work around. ESLint 9.34 (August 2025)
      added multithreaded linting, meaningfully narrowing the historical
      speed gap with Biome, which reduces the main cost of choosing the
      slower-but-more-complete option. The ongoing multi-package
      maintenance burden (flat-config ESLint + typescript-eslint +
      eslint-plugin-react/-hooks + Prettier + eslint-config-prettier) is
      real but well-understood and well-documented, versus Biome's gaps
      being the kind of thing that surfaces mid-project once a specific
      framework rule is needed and missing.
    alternatives_considered:
      - option: "Biome v2 (primary, single-binary)"
        rejected_because: "Faster and dramatically simpler to configure, but has no official Nx plugin (manual wiring only), thin Next.js/React-Compiler rule coverage, and only ~75-85% parity with typescript-eslint's type-aware rules — gaps that are well-documented as of mid-2026 and that this platform should not build around for apps that may need full framework-rule coverage. Worth re-evaluating in a future platform TDR revision if Biome's Nx integration and framework coverage mature."
      - option: "Oxlint (Oxc toolchain)"
        rejected_because: "Emerging and notably favored by Nx's own 2026 roadmap for future integration work, but has even less mature ecosystem adoption and documentation today than Biome; not yet a credible default for a project starting now."
    research_sources:
      - url: "https://biomejs.dev/blog/biome-v2/"
        note: "Biome v2 'Biotype' announcement (2025-06-17): type-aware linting without tsc, noFloatingPromises ~75% parity with typescript-eslint (self-reported). Accessed 2026-06-30."
      - url: "https://biomejs.dev/blog/biome-v2-5/"
        note: "v2.5 release notes: 500+ lint rules milestone, ~13% perf improvement. Accessed 2026-06-30."
      - url: "https://github.com/biomejs/biome/releases"
        note: "Confirmed v2.5.1 as latest published release (2026-06-23). Accessed 2026-06-30."
      - url: "https://nx.dev/blog/integrate-biome-in-20-minutes"
        note: "Nx's own blog post (2025-09-16) confirming no official @nx/biome plugin exists; manual nx:run-commands wiring is the documented pattern. Accessed 2026-06-30."
      - url: "https://nx.dev/blog/nx-2026-roadmap"
        note: "Nx 2026 roadmap (2026-02-04): Nx is investing in oxlint integration, describes Biome as a tool they are 'watching' rather than building first-party support for. Accessed 2026-06-30."
      - url: "https://github.com/biomejs/biome/discussions/5290"
        note: "Confirms React Compiler lint rules unimplemented in Biome as of late June 2026."
      - url: "https://eslint.org/blog/2025/08/multithread-linting"
        note: "ESLint 9.34 (Aug 2025) added multithreaded linting, narrowing the historical performance gap with Biome. Accessed 2026-06-30."
      - url: "https://news.ycombinator.com/item?id=43913950"
        note: "61-comment HN thread (May 2025) on a real ESLint→Biome migration; primary source for documented production friction (CI linting breakage, JSX/TSX rule gaps, import-sort bugs) balanced against praise for dependency simplification. Accessed 2026-06-30."
      - url: "https://2025.stateofjs.com/en-US/other-tools/"
        note: "State of JS 2025: Biome usage ~16.3% of utility-question respondents (1,762/10,812) vs ESLint ~89.7%, Prettier ~86.0% — confirms Biome is fast-growing but still a minority choice industry-wide. Accessed 2026-06-30."

  shared_design_system_tooling:
    selected: "Tailwind CSS v4, with platform-level shared theme/tokens distributed via a libs/design-tokens package using v4's CSS-first @theme configuration"
    version: "4.3.1 (latest stable as of research date)"
    decision_type: researched
    rationale: >
      Tailwind v4's CSS-first configuration (design tokens defined via
      `@theme` in a plain CSS file rather than a JS config object) maps
      naturally onto an Nx/pnpm monorepo: the token/theme CSS file lives in
      its own shared package (e.g. `libs/design-tokens`) and is imported by
      each app the same way a shared TypeScript package would be, per Nx's
      own documented pattern for sharing Tailwind styles across monorepo
      apps. This is genuinely cross-app (every portfolio app needs a
      consistent visual baseline) without dictating business logic or
      component primitives, which stay app-specific per the prompt's
      sharing boundary. Scope is intentionally limited to the shared
      config/tokens layer — a shared component primitives package (e.g. a
      full UI kit) is deferred as an app-level or future-TDR decision,
      since it isn't yet clear it's needed before a second app exists to
      validate real reuse.
    alternatives_considered:
      - option: "No shared Tailwind config — each app configures Tailwind independently"
        rejected_because: "Misses an easy, low-risk win: a shared token package costs little to set up now and prevents visual drift across apps from day one, which matters for a portfolio meant to look like one coherent body of work."
      - option: "Tailwind v3 (prior major, JS-config-based)"
        rejected_because: "Superseded by v4; starting greenfield on v3 would mean an unnecessary future migration with no offsetting benefit."
    research_sources:
      - url: "https://github.com/tailwindlabs/tailwindcss/releases"
        note: "Confirmed 4.3.1 as latest stable release. Accessed 2026-06-30."
      - url: "https://nx.dev/blog/sharing-tailwind-styles-nx-monorepo"
        note: "Nx's own blog documenting the shared-theme-CSS-package pattern for Tailwind v4 in Nx monorepos. Accessed 2026-06-30."
      - url: "https://eosl.date/eol/product/tailwind-css/"
        note: "Confirms Tailwind 4.3.1 is current supported release as of June 2026, alongside 3.4 (supported until 2027-02-28). Accessed 2026-06-30."

  shared_mock_backend_strategy:
    decision_type: locked_in_not_researched
    note: >
      This is a transcription of an already-decided platform-wide
      convention, not a researched/scored decision — per instruction, no
      alternatives to MSW itself were evaluated. A quick currency check on
      MSW v2 was performed (see msw_version below) since it underpins a
      v2-specific capability (WebSocket interception) the decision depends
      on.
    msw_version:
      selected: "MSW (Mock Service Worker) v2"
      version: "2.14.6 (latest published as of research date)"
      currency_check: >
        Confirmed current and actively maintained: no v3 has shipped, the
        official site/GitHub show v2 as the current major version, and
        release cadence is active (v2.14.5 and v2.14.6 both shipped within
        the prior ~2 months of the research date, with substantive
        WebSocket-related fixes). MSW v1 had no WebSocket interception at
        all — the `ws` namespace/API was introduced specifically as an
        MSW 2.0 feature, confirming v2 is required (not optional) for the
        WebSocket-based real-time-feed demos this platform anticipates.
      research_sources:
        - url: "https://www.npmjs.com/package/msw"
          note: "Confirmed 2.14.6 latest published version. Accessed 2026-06-30."
        - url: "https://github.com/mswjs/msw/releases"
          note: "Confirmed active release cadence, no v3. Accessed 2026-06-30."
        - url: "https://mswjs.io/blog/introducing-msw-2.0/"
          note: "Confirms WebSocket support (ws namespace) was introduced in MSW 2.0, not present in v1."
        - url: "https://mswjs.io/docs/websocket/"
          note: "Current WebSocket interception docs, v2-only."
    architectural_pattern: "services-first, handlers-second"
    architectural_pattern_description: >
      Small, stateful TypeScript service classes hold the real invariants
      (e.g., for Clearline: ledger, idempotency, payment-intent services;
      other future apps implement their own domain-equivalent services).
      MSW handlers are thin HTTP/WebSocket adapters in front of those
      services — they do not hold business logic themselves. This is a
      platform-level convention every app's libs/mock-backend/ should
      follow; the specific services are app-specific, the pattern is
      shared.
    structural_convention: "libs/mock-backend/{services,handlers,fixtures}/ + browser.ts (dev/Storybook) + server.ts (Vitest/Playwright)"
    structural_convention_note: >
      Standard shape reused per-app, with app-specific service/handler
      contents. App-level TDRs should adopt this directory shape directly
      rather than inventing their own.
    contract_testing:
      selected: "Rejected platform-wide: no Pact (or other consumer-driven contract testing tool)"
      decision_type: locked_in_not_researched
      rationale: >
        No second, independently-verifying provider exists for any app in
        this portfolio — every "backend" is the mock service layer itself.
        A Pact suite under these conditions would only test a mock against
        itself, which Pact's own documentation explicitly warns against as
        providing false confidence. Instead, API contracts are recorded as
        documented TypeScript/OpenAPI-style specs in `libs/contracts`,
        implemented directly by the mock service layer — giving type-level
        contract enforcement without a consumer-driven-contract tool that
        has no real second party to verify against.
      reference: >
        This decision is documented in full as a shared ADR (ADR-006 in
        the Clearline plan's numbering). This platform TDR is the
        canonical record of the platform-wide version of that decision.
        App-level TDRs (including the Clearline app TDR) should reference
        ADR-006 / this section rather than re-deriving the Pact-rejection
        rationale independently.
    inheritance_note: >
      MSW v2, the services-first pattern, the libs/mock-backend structural
      convention, and the Pact rejection are all platform decisions to be
      inherited by every app TDR in this portfolio, not per-app choices to
      reconsider. The Clearline app TDR should cite this section directly.

  error_tracking:
    selected: "Sentry (Developer/free plan)"
    version: "Sentry Developer plan, current free tier as of research date"
    decision_type: researched
    status: adopted
    rationale: >
      Originally evaluated as a "defer/skip" judgment call — these are
      frontend-only demo apps with no real backend, no real users, and no
      production error volume to monitor, so the core problem error
      tracking solves (triaging errors from sessions you can't directly
      observe) didn't clearly justify the setup cost. On reconsideration,
      adopted now instead: Sentry's free Developer plan costs nothing
      (5,000 error events/month, unlimited projects, 30-day retention, no
      credit card required) and provides real value even pre-launch —
      catching JS errors during demos/walkthroughs that the person driving
      might not notice live, and giving this portfolio a small,
      low-effort way to demonstrate observability tooling as a skill in
      its own right. The single-user seat cap is irrelevant for a solo
      maintainer, and the SDK/setup burden is light enough not to be a
      meaningful tax on a frontend-only app.
    setup_note: >
      Add the Sentry SDK per-app (one DSN per app, not a single shared
      DSN across the portfolio) so each demo app's errors are triaged
      independently; confirm CSP allows the Sentry beacon if any app sets
      a strict Content-Security-Policy, since that's a documented failure
      mode for silent SDK breakage.
    revisit_triggers:
      - "5,000 events/month free-tier ceiling is approached — re-evaluate paid tier vs. self-hosted GlitchTip at that point."
      - "A real backend/auth layer is added — extend Sentry to backend error tracking too, or re-evaluate scope at that time."
    fallback_alternative: "GlitchTip — MIT-licensed, self-hostable, free hosted tier capped at 1,000 events/month; worth it only if self-hosting becomes preferable to a SaaS account."
    alternatives_considered:
      - option: "No error tracking (defer indefinitely)"
        rejected_because: "The original deferral rationale (no production traffic to generate signal) is real, but the free-tier cost of adopting Sentry now is zero, and catching demo-time JS errors plus the observability-as-skill angle outweigh the small setup cost — not worth waiting for a trigger event that may never come for a portfolio project."
      - option: "Bugsnag"
        rejected_because: "Free tier exists but offers no advantage over Sentry for this use case (unpublished exact event cap, no differentiating feature relevant here)."
    research_sources:
      - url: "https://sentry.io/pricing/"
        note: "Confirmed Developer/free plan: 5,000 events/mo, unlimited projects, 30-day retention, no card required. Accessed 2026-06-30."
      - url: "https://glitchtip.com/pricing/"
        note: "Confirmed GlitchTip free hosted tier (1,000 events/mo) and self-host option. Accessed 2026-06-30."
      - url: "https://www.bugsnag.com/pricing/"
        note: "Confirmed permanent free tier exists, 7-day retention; exact event cap not published. Accessed 2026-06-30."

# ---------------------------------------------------------------------------
# Infrastructure providers — real, currently-priced selections for what's
# genuinely needed today, plus explicit deferred entries for backend infra
# that has no real app to size it against yet.
# ---------------------------------------------------------------------------
infrastructure_providers:
  frontend_hosting:
    selected: "Vercel"
    plan: "Hobby (free tier)"
    decision_type: researched
    rationale: >
      Vercel has the most mature native Nx/Turborepo monorepo tooling of
      the options compared: each app subdirectory becomes its own Project
      with its own URL, native workspace detection, and a documented
      `nx-ignore` mechanism (via Vercel's own "Deploying Nx to Vercel"
      guide) to skip building apps that aren't affected by a given change
      — directly matching this platform's multi-independent-app structure.
      It also has the best first-party fit if any app is built on Next.js,
      and unlimited free preview deployments on every push/PR. At true
      low-traffic portfolio-demo scale (100GB Fast Data Transfer, 1M
      function invocations, 4 Active-CPU-hours/month included on Hobby),
      none of the free-tier ceilings are realistically approached, so
      $0/month is the expected steady-state cost, with the $20/seat/month
      Pro tier as headroom that still fits the $0–20/month budget if ever
      needed.
    cost_estimate_monthly_usd: 0
    free_tier_coverage: >
      100GB Fast Data Transfer/mo, 1M serverless function invocations,
      1M Edge Requests, 4 Active CPU-hours/mo, 200 projects (25 per
      connected Git repo), unlimited preview deployments, 45-min build
      cap, 1 concurrent build, 300-second max function duration. As of
      late April 2026, Hobby deployments default to 30-day retention
      (most recent 10 production deployments and aliased deployments
      exempt).
    known_caveats:
      - "Hobby tier is explicitly restricted to non-commercial personal use per Vercel's Fair Use Guidelines. A portfolio of demo apps (not a revenue-generating product) is the textbook non-commercial case, but flagging this for human awareness — if any app starts processing real payments or running ads, budget the $20/mo Pro seat."
      - "Hobby allows only 1 concurrent build — independent app builds in the monorepo will queue/serialize rather than run in parallel, which is acceptable at solo-dev change cadence but worth knowing."
    alternatives_considered:
      - option: "Netlify"
        evaluated_state: "Free tier underwent a major restructuring on 2025-09-04 to credit-based pricing for new accounts (300 credits/mo, ~20 production deploys/mo equivalent); 1 concurrent build; Nx auto-detection exists but per-site rebuild-skipping requires a manual ignore script per site rather than Vercel's more automatic affected-based skip."
        rejected_because: "Workable, but Nx integration is less automatic than Vercel's, and the recent pricing-model change (credits vs. the historical build-minutes model) adds near-term uncertainty for budgeting against a fixed $0–20/mo target."
      - option: "Cloudflare Pages"
        evaluated_state: "Most generous raw free tier (unlimited static bandwidth, 500 builds/mo), but capped at 5 Pages projects per single repo and Nx-specific guidance comes only from Nx's own blog post, not official Cloudflare docs."
        rejected_because: "The 5-projects-per-repo cap is a real constraint for a platform explicitly designed to host multiple independent apps from one monorepo over time, and the thinner first-party Nx documentation is a step down in 'zero-DevOps' ergonomics relative to Vercel today. Worth re-evaluating if the portfolio outgrows Vercel's comfort zone or true high-traffic free bandwidth becomes the binding constraint."
    research_sources:
      - url: "https://vercel.com/docs/plans/hobby"
        note: "Hobby tier limits, non-commercial restriction. last_updated 2026-06-16. Accessed 2026-06-30."
      - url: "https://vercel.com/docs/limits"
        note: "Bandwidth/function/project/build limits, Hobby vs Pro comparison. last_updated 2026-06-16. Accessed 2026-06-30."
      - url: "https://vercel.com/pricing"
        note: "Pro tier $20/seat/mo pricing, included usage. Accessed 2026-06-30."
      - url: "https://vercel.com/docs/monorepos/nx"
        note: "Official Vercel↔Nx integration guide (nx-ignore mechanism). last_updated 2026-03-11. Accessed 2026-06-30."
      - url: "https://vercel.com/docs/limits/fair-use-guidelines"
        note: "Verbatim non-commercial-use restriction text. Accessed 2026-06-30."
      - url: "https://vercel.com/changelog/hobby-projects-now-default-to-30-day-deployment-retention"
        note: "30-day Hobby deployment retention change, effective 2026-04-29."
      - url: "https://docs.netlify.com/manage/accounts-and-billing/billing/billing-for-credit-based-plans/credit-based-pricing-plans/"
        note: "Netlify credit-based free tier (300 credits/mo), effective for accounts created on/after 2025-09-04."
      - url: "https://developers.cloudflare.com/pages/configuration/monorepos/"
        note: "Cloudflare Pages monorepo support, 5-projects-per-repo cap."
      - url: "https://nx.dev/blog/pnpm-monorepo-cloudflare-pages"
        note: "Nx's own (not Cloudflare's) guide for deploying an Nx/pnpm monorepo to Cloudflare Pages, dated ~2026-04."

  ci_cd_provider:
    selected: "GitHub Actions"
    decision_type: researched
    rationale: >
      Confirmed rather than assumed: GitHub Actions remains free and
      unlimited for public repos and includes 2,000 minutes/month for
      private repos on the free plan, with 20 concurrent jobs (5 macOS).
      The December 2025/January 2026 pricing overhaul cut hosted-runner
      per-minute rates up to 39% and left free included-minutes unchanged;
      the one controversial proposed change (a new per-minute charge on
      self-hosted runners) was postponed indefinitely after community
      backlash and doesn't apply to a solo dev not using self-hosted
      runners. No alternative offers a meaningfully better free tier for
      this workload — CircleCI's larger credit pool (~30,000 credits/mo,
      ≈3,000 build-minutes) is real but adds a second CI account to
      maintain for no clear benefit at this scale, and GitLab CI's
      400-minutes/month free tier is too small to be a serious contender.
      GitHub Actions also has the best first-party Nx tooling fit (a
      built-in `nx g ci-workflow --ci=github` generator) and pairs
      naturally with `nx affected` to avoid full-monorepo rebuilds.
    cost_estimate_monthly_usd: 0
    free_tier_coverage: >
      Unlimited minutes on public repos; 2,000 minutes/month on private
      repos (Free plan); 20 concurrent jobs total (max 5 concurrent
      macOS); 10GB cache per repo; 500MB artifact storage.
    alternatives_considered:
      - option: "CircleCI"
        rejected_because: "More generous free compute (~30,000 credits/mo ≈ 3,000 build-minutes, 30 concurrent jobs) but adds a second CI vendor/account for a solo maintainer to set up and maintain, for no benefit at this project's scale; worth revisiting only if GitHub Actions' 2,000-minute private-repo allowance is ever actually exceeded."
      - option: "GitLab CI (GitLab.com SaaS)"
        rejected_because: "Free tier capped at 400 compute-minutes/month per namespace — repeatedly described in current comparisons as too small for even light solo use, and stable at that level since an October 2020 cut with no 2025/2026 increase."
    research_sources:
      - url: "https://docs.github.com/en/billing/concepts/product-billing/github-actions"
        note: "Official free-tier minutes/storage limits. Accessed 2026-06-30."
      - url: "https://docs.github.com/en/actions/reference/limits"
        note: "Concurrent job limits (20 total, 5 macOS). Accessed 2026-06-30."
