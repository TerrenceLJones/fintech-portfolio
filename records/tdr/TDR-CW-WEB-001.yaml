        note: 'fast-check latest v4.8.0, ~10.4M weekly downloads, dominant JS property-testing lib. Accessed 2026-06-30.'
      - url: 'https://playwright.dev/docs/release-notes'
        note: 'Playwright latest stable v1.61.0, active feature development. Accessed 2026-06-30.'
      - url: 'https://testdino.com/blog/playwright-alternatives'
        note: 'Playwright leads E2E adoption in 2026; not superseded. Accessed 2026-06-30.'
