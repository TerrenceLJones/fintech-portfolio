  title: 'clearline-web — App Baseline Technology Decisions'
  decision_date: '2026-06-30'
  version: '1.0'
  author: 'Technology Strategy Agent'
  research_window: '2026-06-30 (single-day research pass, 7 parallel research agents; all sources cited with access dates)'

technology_decision_scope:
  level: app
  inherits_from: TDR-PLATFORM-001
  override_rationale: 'None. No platform-level decision is overridden by this TDR.'

# ---------------------------------------------------------------------------
# App context
# ---------------------------------------------------------------------------
app_context:
  app_name: clearline-web
  app_baseline_tdr: null # this TDR IS the baseline for clearline-web
  existing_app_technologies: 'None — greenfield app; apps/clearline-web/package.json currently has placeholder build/test/dev/start scripts pending this TDR'
  embedded_features: 'None cross-app yet — clearline-web is the first app in the fintech-portfolio.'
  integration_with_other_apps: 'None — standalone, no shared packages with other apps at this time.'

# ---------------------------------------------------------------------------
# Technology decisions
# ---------------------------------------------------------------------------
technology_decisions:
  # --- Inherited from platform, unchanged --------------------------------
