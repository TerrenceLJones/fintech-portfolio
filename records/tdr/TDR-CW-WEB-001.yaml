  package_manager:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'pnpm'
    version: '9.x (currently installed: 9.15.1)'
    fit_confirmation: 'No app-specific concern; standard Nx/pnpm pairing.'

  typescript_version:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'TypeScript 6.0'
    version: '6.0.3'
    fit_confirmation: 'Confirmed compatible with React 19.2 + Vite 7.3 tooling researched below; no version conflict found.'

  nodejs_version:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'Node.js 24 ("Krypton")'
    version: '24.x — Active LTS'
    fit_confirmation: 'No app-specific concern.'

  linter_formatter:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'ESLint + Prettier'
    version: 'ESLint 9.x (flat config) + Prettier 3.x'
    fit_confirmation: "Applies to clearline-web's TS/React/JSX source directly; no framework-coverage gap identified for a React app specifically (this was in fact the deciding factor in the platform-level decision)."

  error_tracking:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'Sentry (Developer/free plan)'
    version: 'Sentry Developer plan, free tier'
    fit_confirmation: 'One DSN for clearline-web specifically, per platform setup_note. Framework-specific SDK will be @sentry/react (confirmed compatible with React 19 + Vite).'

  shared_mock_backend_strategy:
    inherited_from: TDR-PLATFORM-001
    override: false
    decision_type: locked_in_not_researched
    msw_version:
      selected: 'MSW (Mock Service Worker) v2'
      version: '2.14.6'
    architectural_pattern: 'services-first, handlers-second'
    contract_testing:
      selected: 'No Pact / no consumer-driven contract testing'

  # --- Newly researched for this app --------------------------------------
  frontend_framework_and_build_tool:
    selected: 'React 19 + TypeScript + Vite'
    version: 'React 19.2.x (latest patch 19.2.7); Vite 7.3.x; @nx/vite 22.7.x'
    decision_type: researched
    rationale: >
      Confirms the plan's choice. React remains current — no React 20 has
      shipped or been announced as of the research date; React 19.2 (Oct
      2025) added Activity boundaries and performance-tracking features
      directly useful for a data-dense dashboard (deferring/hiding
      offscreen UI, e.g. inactive dashboard tabs). Vite remains the right
      build tool: @nx/vite is a first-party, actively-released Nx plugin
      (v22.7.5, weeks old at research time) that infers Vite config as Nx
      targets and integrates @vitejs/plugin-react cleanly for a
      monorepo-hosted SPA. React is also the correct framework specifically
      for this project's portfolio-signaling goal: Ramp's own published
      frontend interview challenge and Brex's frontend job postings both
      confirm React + TypeScript (Brex's Frontend Platform posting also
      names GraphQL) as their actual stack — matching the target companies'
      real tooling carries more interview signal here than a theoretical
      performance edge from Solid/Svelte/Vue.
    version_pin_decision: >
      Vite 8.0 (Rolldown/Oxc-based, GA 2026-03-12) is a legitimate, faster
      option but was only ~3.5 months old at research time and still
      stabilizing plugin-ecosystem edge cases. Vite 7.3.x — the last
      pre-Rolldown line, still receiving active patches — is the more
      conservative pin for a solo-maintained demo that needs to "just
      work" without chasing a very new major. This is a judgment call, not
      a hard technical requirement; Vite 8.1.x is a defensible alternative
      pin if newer-tooling signal is prioritized over stability margin.
    alternatives_considered:
      - option: 'Solid / Svelte / Vue'
        rejected_because: 'No compelling technical edge for this use case, and none matches the actual stack used by the target companies (Ramp, Brex, Mercury) this portfolio is signaling toward.'
      - option: 'Vite 8.x (Rolldown-based)'
        rejected_because: 'Only ~3.5 months old at decision time; Vite 7.3.x offers the same correctness with a longer stability track record for a solo-maintained project. Revisit at next TDR review.'
      - option: 'Rsbuild / standalone Turbopack / Nx module federation'
        rejected_because: "These solve problems (Webpack migration, multi-remote micro-frontend federation) that a single Vite SPA doesn't have."
    research_sources:
      - url: 'https://react.dev/versions'
        note: 'Confirms React 19 is current major; no v20 exists. Accessed 2026-06-30.'
      - url: 'https://react.dev/blog/2025/10/01/react-19-2'
        note: 'React 19.2 release notes — Activity boundaries, perf tracks. Accessed 2026-06-30.'
      - url: 'https://endoflife.date/react'
        note: 'React 19.x patch releases through June 2026 (up to 19.2.7), no v20. Accessed 2026-06-30.'
      - url: 'https://vite.dev/releases'
        note: 'Vite 8.1.x current; Vite 7.3 and 6.4 still receiving patches. Accessed 2026-06-30.'
      - url: 'https://vite.dev/blog/announcing-vite8'
        note: 'Vite 8.0 GA 2026-03-12, Rolldown+Oxc replacing esbuild/Rollup. Accessed 2026-06-30.'
      - url: 'https://nx.dev/docs/technologies/build-tools/vite/introduction'
        note: 'Confirms first-party @nx/vite plugin. Accessed 2026-06-30.'
      - url: 'https://www.npmjs.com/package/@nx/vite'
        note: '@nx/vite v22.7.5, published ~13 days prior to research date. Accessed 2026-06-30.'
      - url: 'https://github.com/jairao31/Ramp-Frontend-Challenge'
        note: "Ramp's own frontend interview challenge confirms React + TypeScript. Accessed 2026-06-30."
      - url: 'https://www.brex.com/careers/8501025002'
        note: 'Brex Senior Frontend Engineer posting requires React/TypeScript. Accessed 2026-06-30.'
      - url: 'https://www.brex.com/careers/8353867002?gh_jid=8353867002'
        note: 'Brex Frontend Platform SWE II posting requires React/TypeScript/GraphQL. Accessed 2026-06-30.'

  workflow_state_modeling:
    selected: 'XState v5'
    version: '^5.32 (latest stable 5.32.2)'
    decision_type: researched
    rationale: >
      Confirms the plan's choice, pinned to v5 (not v6, which is
      alpha-only: 6.0.0-alpha.13 published the same day as this research,
      shipping alphas almost daily but explicitly "still very much in
      progress" per maintainer discussion — unsuitable for a demo meant to
      reflect production-quality decisions). XState remains actively
      maintained (3 listed maintainers, continuous v5 patch cadence
      alongside the v6-alpha work). For this app's two specific machines —
      the payment lifecycle (idle → validating → stepUp? → submitting →
      pending → settled|failed, with an indeterminate state for 5xx) and
      approval routing (submitted → pendingL1 → pendingL2 → approved with
      a hard-blocking SoD guard) — XState's statecharts and guard
      primitives are structurally better suited than a hand-rolled
      reducer or Zustand store: both alternatives don't structurally
      prevent invalid state combinations (the "boolean soup" problem), and
      neither self-documents into an inspectable/visualizable diagram the
      way a statechart does, which matters for both testing and using the
      diagram as a review/demo artifact.
    plan_claim_correction: >
      The project plan states that XState's docs/the Stately team
      "explicitly position payment-authorization flows and multi-step
      approvals as canonical use cases." Research could not verify this —
      the official Stately docs (stately.ai/docs/xstate) describe generic
      framework/runtime use cases without finance-specific framing, and no
      on-point Stately case study was found. The strongest available
      evidence is indirect (a Stately blog reference to "a new payments
      product," and third-party 2025 writeups recommending XState for
      "explicit, testable flows" in complex/async scenarios generally).
      The recommendation to use XState stands on its technical merits for
      this specific use case (guards, nested states, visualizability), but
      the plan's "explicitly positioned as canonical" language should not
      be repeated as a sourced claim; softened here accordingly.
    alternatives_considered:
      - option: 'useReducer / plain reducer'
        rejected_because: "Doesn't structurally prevent invalid state combinations; the exact 'boolean soup' problem the plan is trying to avoid."
      - option: 'Zustand'
        rejected_because: 'Lighter-weight, but same structural gap as a plain reducer for guard-heavy, multi-branch workflows like the SoD-guarded approval machine.'
      - option: 'XState v6 (alpha)'
        rejected_because: 'Not stable; alpha channel with no ETA for GA as of the research date. Revisit once v6 reaches a stable release.'
    research_sources:
      - url: 'https://registry.npmjs.org/xstate'
        note: 'npm dist-tags confirm latest=5.32.2 (stable), alpha=6.0.0-alpha.13 (unstable). Accessed 2026-06-30.'
      - url: 'https://github.com/statelyai/xstate/discussions/5061'
        note: 'v6 roadmap discussion; maintainer confirms still in progress, no stable ETA. Accessed 2026-06-30.'
      - url: 'https://stately.ai/docs/xstate'
        note: 'Official docs use generic positioning, no explicit payments/approval case study found. Accessed 2026-06-30.'
      - url: 'https://www.makersden.io/blog/react-state-management-in-2025'
        note: '2025 industry comparison recommending XState for explicit/testable complex async flows vs Zustand/Jotai. Accessed 2026-06-30.'
      - url: 'https://dev.to/ibrocodes/reducer-vs-finite-state-machines-understanding-the-paradigm-shift-177a'
        note: "Explains the 'impossible states' problem directly relevant to payment lifecycle modeling. Accessed 2026-06-30."

  server_state_data_fetching:
    selected: 'TanStack Query'
    version: '5.101.2 (@tanstack/react-query)'
    decision_type: researched
    rationale: >
      Confirms the plan's choice; no v6 exists for the React adapter (only
      Svelte Query has a "v6" label, still on the same v5 core). TanStack
      Query's mutation `retry` option accepts a custom function receiving
      (failureCount, error), directly enabling "retry only on
      network/5xx errors, never blind-retry on 4xx" per this app's error
      taxonomy. TanStack's own retry/offline-mutation guidance explicitly
      recommends a stable idempotency key generated once per mutation
      attempt and unchanged across retries — a direct match for this
      app's vendor-payment idempotency requirement. useMutation's
      onMutate/onError/onSettled lifecycle gives standard
      optimistic-update-with-rollback out of the box, stronger than SWR's
      useSWRMutation for this app's multi-cache-key coordination needs
      (e.g. bulk-approve partial-failure UX).
    alternatives_considered:
      - option: 'SWR'
        rejected_because: 'Lighter (~10KB) but weaker for complex mutation/rollback orchestration across multiple cache keys, which this app needs for bulk-approve partial-failure handling.'
      - option: 'RTK Query'
        rejected_because: 'Not applicable — no Redux is in scope for this app.'
    research_sources:
      - url: 'https://registry.npmjs.org/@tanstack/react-query/latest'
        note: 'npm registry confirms current published version 5.101.2, no v6 for React. Accessed 2026-06-30.'
      - url: 'https://github.com/tanstack/query/releases'
        note: 'Confirms ongoing v5.x cadence through June 2026, no major v6 React release. Accessed 2026-06-30.'
      - url: 'https://tanstack.com/query/v4/docs/framework/react/guides/query-retries'
        note: 'Documents custom retry function signature (failureCount, error) enabling skip-on-4xx logic. Accessed 2026-06-30.'
      - url: 'https://www.pkgpulse.com/guides/tanstack-query-vs-swr-2026'
        note: '2026 comparison confirms TanStack Query stronger for complex optimistic-update/mutation coordination vs SWR. Accessed 2026-06-30.'

  api_style_and_graphql_client:
    selected: 'GraphQL, with Apollo Client as the client library'
    version: '@apollo/client 4.2.4'
    decision_type: researched
    rationale: >
      Confirms GraphQL as the API style for data-dense dashboard views
      (precise field selection), per the plan. The plan explicitly left
      the client choice open between Apollo Client and urql — this is
      resolved here in favor of Apollo Client, though the evidence is
      genuinely close and is flagged for human review below. Apollo
      Client 4.0 (mid-2025) was a ground-up rewrite specifically to shed
      historical weight (opt-in local-state, opt-in HttpLink, ESM/
      tree-shaking, RxJS instead of zen-observable), closing roughly
      20-30% of its historical bundle-size gap with urql. MSW's own
      GraphQL documentation is explicitly client-agnostic, naming Apollo,
      Relay, and urql as equally supported — so mock-backend compatibility
      is a wash between the two candidates and did not drive the decision.
      The deciding factor was ecosystem/enterprise-recognition fit for
      this project's portfolio-signaling goal: general market-positioning
      sources consistently describe Apollo Client as the incumbent
      enterprise default with the largest ecosystem, tooling, and
      hiring-pool recognition, while urql is positioned as the
      lighter/leaner alternative. Apollo's normalized caching is also
      genuinely useful for this app's "data-dense dashboard" requirement.
    human_review_flag: >
      Research could NOT find direct engineering-blog-level confirmation
      of Ramp's, Brex's, or Mercury's actual internal GraphQL client
      choice — the recommendation above rests on general
      market-positioning/comparison sources, not company-specific
      evidence. If you have direct knowledge of which client one of these
      companies actually uses, that should override this recommendation.
      Also note: urql wins narrowly on raw bundle size (~7-17KB gzipped
      vs. Apollo's ~30-40KB minimum) and architectural simplicity
      (exchange-based, arguably easier for a solo maintainer to reason
      about) — this delta is immaterial for a demo not optimizing
      production Core Web Vitals, but is a legitimate reason to prefer
      urql if you weight "simplicity for a solo maintainer" more heavily
      than "enterprise-recognition signal."
    implementation_note: >
      Codegen: use GraphQL Code Generator's modern Apollo 4 "client
      preset" path from day one, not the older typescript-react-apollo
      generated-hooks path — Apollo Client 4.0 broke compatibility with
      the latter (a codemod exists for migration, but this is a new
      project so there's no migration needed if set up correctly from the
      start). MSW mocking note: Apollo's normalized cache sometimes
      expects __typename on mocked response objects to key entities
      correctly — add __typename to MSW GraphQL resolver responses (a
      minor, well-documented pattern, not a blocker).
    mock_backend_gap_flag: >
      mock-backend-architecture.md's documented handler list
      (libs/mock-backend/handlers/) is REST-only (transfers, ledger,
      payments, websocket) — it does not yet include a GraphQL handler
      file for the dashboard queries this API-style decision implies. MSW
      v2 supports graphql.query/graphql.mutation handlers identically to
      REST handlers and is confirmed client-agnostic (works the same
      regardless of Apollo vs. urql), so this is additive, not
      contradictory. See mock_backend_architecture section below for the
      concrete recommendation (a new dashboard.graphql.handlers.ts file).
    alternatives_considered:
      - option: 'urql'
        rejected_because: "Narrowly better on bundle size and architectural simplicity, but Apollo Client's ecosystem standardness and enterprise recognition were weighted higher for this portfolio-signaling project. See human_review_flag — this is a close call, not a decisive one."
    research_sources:
      - url: 'https://www.npmjs.com/package/@apollo/client'
        note: 'Confirms Apollo Client current version 4.2.4. Accessed 2026-06-30.'
      - url: 'https://www.npmjs.com/package/@urql/core'
        note: 'Confirms urql core current version 6.0.3. Accessed 2026-06-30.'
      - url: 'https://www.apollographql.com/blog/announcing-apollo-client-4-0'
        note: 'Apollo Client 4.0 rewrite: opt-in local state, ESM, ~20-30% bundle reduction; codegen breaking change. Accessed 2026-06-30.'
      - url: 'https://mswjs.io/docs/graphql/'
        note: 'MSW GraphQL docs explicitly client-agnostic, name Apollo/Relay/urql as equally supported. Accessed 2026-06-30.'
      - url: 'https://www.pkgpulse.com/guides/apollo-client-vs-urql-2026'
        note: '2026-dated comparison: Apollo for complex GraphQL/caching, urql for lighter-weight React GraphQL. Accessed 2026-06-30.'
      - url: 'https://hasura.io/blog/exploring-graphql-clients-apollo-client-vs-relay-vs-urql'
        note: 'Apollo smallest usable build ~30.7KB vs urql ~7.1KB gzipped; Apollo has largest community/feature set. Accessed 2026-06-30.'
      - url: 'https://graphql-code-generator.com/docs/plugins/typescript-react-apollo'
        note: 'Confirms codegen plugin support for Apollo (parallel typescript-urql plugin exists for urql). Accessed 2026-06-30.'

  styling_and_component_base:
    decision_type: researched_and_inherited
    tailwind:
      inherited_from: TDR-PLATFORM-001
      override: false
      selected: 'Tailwind CSS v4 (shared tokens via libs/design-tokens)'
      version: '4.3.1'
      fit_confirmation: 'Fits directly — clearline-web is the app this platform-level shared-tokens decision was designed around.'
    component_primitives_base:
      selected: 'Radix, via the unified `radix-ui` package'
      version: 'radix-ui (unified package, current as of 2026-06)'
      decision_type: researched
      rationale: >
        Confirms Radix as the accessible/unstyled primitives base, with
        one adjustment to the plan's literal wording: install/import from
        the unified `radix-ui` npm package rather than individual
        `@radix-ui/react-*` packages (e.g. `import { Dialog as
        DialogPrimitive } from "radix-ui"`). This consolidation is now
        the documented recommended pattern (shadcn/ui's new-york style
        adopted it as default in June 2025, with a further "unified" push
        documented Feb 2026); it's the same library, just the current
        best-practice install pattern — a tree-shakable single dependency
        instead of dozens of per-component packages. Radix remains
        actively maintained (releases as recent as 2026-06-30 and
        2026-06-06 fixing Toast memory leaks and React 19 issues, adding
        Context Menu and form-control composition APIs) despite a
        documented post-WorkOS-acquisition (2022) maintainer-turnover
        slowdown that has since been reinvested in. Accessibility
        credentials remain strong and directly relevant: Radix Primitives
        follow WAI-ARIA Authoring Practices and are tested against
        NVDA/JAWS/VoiceOver, supporting this app's planned WCAG 2.1 AA
        pass (EPIC-CW-014).
      alternatives_considered:
        - option: 'Base UI (MUI + ex-Radix team)'
          rejected_because: "Reached v1.0 in December 2025 — a legitimate, maturing alternative with broader native component coverage (multi-select, combobox, autocomplete) and a single consolidated package by design, but as of this research date it's only ~6 months past 1.0 with a thinner production track record than Radix. Worth revisiting at the next TDR review cycle if Radix maintenance velocity drops or Base UI's coverage advantage becomes decisive."
        - option: 'shadcn/ui'
          rejected_because: "Not a true alternative to Radix — it's a styled component layer typically built ON TOP of Radix (or, now, optionally Base UI), not a replacement for the underlying unstyled-primitives decision this TDR is making."
      research_sources:
        - url: 'https://ui.shadcn.com/docs/changelog/2026-02-radix-ui'
          note: 'Confirms shift to unified radix-ui package and migration command. Accessed 2026-06-30.'
        - url: 'https://www.npmjs.com/package/radix-ui'
          note: 'Official unified radix-ui npm package. Accessed 2026-06-30.'
        - url: 'https://www.radix-ui.com/primitives/docs/overview/releases'
          note: 'Release log showing active June 2026 releases (Toast fixes, Context Menu). Accessed 2026-06-30.'
        - url: 'https://www.radix-ui.com/primitives/docs/overview/accessibility'
          note: 'Official WAI-ARIA compliance and assistive-tech testing claims. Accessed 2026-06-30.'
        - url: 'https://ui.shadcn.com/docs/changelog/2026-01-base-ui'
          note: 'shadcn/ui adds Base UI as a selectable primitives base alongside Radix. Accessed 2026-06-30.'
        - url: 'https://preblocks.com/blog/radix-ui-vs-base-ui'
          note: '2026 comparison: Radix guardrails vs Base UI toolkit philosophy, component coverage gap. Accessed 2026-06-30.'

  ai_integration:
    selected: 'Anthropic API — Claude Sonnet 5 (claude-sonnet-5)'
    version: '@anthropic-ai/sdk 0.109.0'
    decision_type: researched
    rationale: >
      Confirms the plan's choice of Claude for invoice extraction/GL-code
      suggestion, and selects the specific model: Claude Sonnet 5 over
      Opus 4.8, Haiku 4.5, and Fable 5. All four current models support
      vision input and structured/schema-constrained JSON output, so that
      isn't a differentiator. Sonnet 5 delivers near-Opus accuracy on
      document-extraction and structured-classification work (Anthropic's
      own positioning: "best combination of speed and intelligence") at
      roughly half Opus's price — a materially lower risk than Haiku 4.5,
      which is meaningfully weaker on nuanced extraction judgment calls
      (subtotal/tax/line-item edge cases, low-confidence GL-code
      decisions) that are exactly the cases this feature's
      confidence-gating design depends on getting right. Opus 4.8 and
      Fable 5 are unnecessary for a bounded extraction+classification
      task rather than open-ended agentic reasoning (Fable 5 is
      explicitly positioned for "the most demanding reasoning and
      long-horizon agentic work," and requires 30-day data retention —
      neither property is relevant here).
      Structured output implementation: use `client.messages.parse()`
      with `zodOutputFormat()` from `@anthropic-ai/sdk/helpers/zod`,
      which validates and types the extraction response (vendor, amount,
      line items, suggested GL code, confidence score per field)
      automatically — this is the current (GA) recommended pattern,
      supported identically across Sonnet 5/Opus 4.8/Haiku 4.5/Fable 5.
    pricing:
      claude_sonnet_5: '$3.00 / $15.00 per MTok (input/output); introductory pricing $2.00 / $10.00 per MTok through 2026-08-31'
      claude_opus_4_8: '$5.00 / $25.00 per MTok'
      claude_haiku_4_5: '$1.00 / $5.00 per MTok'
      claude_fable_5: '$10.00 / $50.00 per MTok'
    cost_estimate_monthly_usd:
      assumptions: '50-200 invoice-extraction calls/month during active demo/development use; each call ~1,800 input tokens (invoice image + prompt/schema overhead) + ~400 output tokens (structured JSON).'
      at_introductory_pricing: '~$0.38 (50 calls) to ~$1.52 (200 calls)/month'
      at_standard_pricing: '~$0.57 (50 calls) to ~$2.28 (200 calls)/month'
      note: 'Trivially cheap either way. This is the only real recurring cost in this TDR — see cost_analysis below.'
    alternatives_considered:
      - option: 'Claude Opus 4.8'
        rejected_because: "Meaningfully higher cost (~$0.95-$3.80/month at this volume) for accuracy headroom this demo-volume extraction task doesn't need. Noted as the natural upgrade path if this ever became a production feature needing maximum extraction accuracy."
      - option: 'Claude Haiku 4.5'
        rejected_because: "Cheapest option, but meaningfully weaker on nuanced financial-document extraction judgment calls — a real risk given the feature's entire design point is correctly identifying low-confidence fields for human review."
      - option: 'Claude Fable 5'
        rejected_because: 'Positioned for long-horizon agentic reasoning, not bounded extraction/classification; also carries a 30-day data-retention requirement not otherwise needed here.'
    research_sources:
      - url: 'https://platform.claude.com/docs/en/about-claude/models/overview.md'
        note: 'Official model comparison table — pricing, vision support, context windows for all four current models. Accessed 2026-06-30.'
      - url: 'https://platform.claude.com/docs/en/build-with-claude/structured-outputs.md'
        note: 'Confirms structured outputs GA on all four current models; documents messages.parse() + zodOutputFormat(). Accessed 2026-06-30.'
      - url: 'https://registry.npmjs.org/@anthropic-ai/sdk/latest'
        note: 'npm registry confirms current published SDK version 0.109.0. Accessed 2026-06-30.'

  testing_stack:
    selected: 'Vitest + React Testing Library, fast-check, Playwright'
    version: 'vitest 4.1.9; @testing-library/react 16.3.2; fast-check 4.8.0; @playwright/test 1.61.0'
    decision_type: researched
    rationale: >
      Light validation pass, as instructed — the plan was already
      committed to this stack. All four tools confirmed current and
      actively maintained with no credible full replacement: Playwright
      leads E2E adoption (~33M weekly downloads vs. Cypress's ~6M) and
      continues active feature development (WebAuthn, storage APIs);
      fast-check is dominant in JS/TS property-based testing (~10.4M
      weekly downloads) with no maintained credible alternative
      (JSVerify is niche/unmaintained); @testing-library/react 16.3.2 is
      React-19-compatible and current. Vitest itself is actively
      developed (4.1.9 stable, 5.0 in beta as of mid-June 2026).
    nx_integration_note: >
      One actionable finding: Nx v22 split Vitest support out of the
      general-purpose @nx/vite plugin into a new dedicated @nx/vitest
      plugin (adds CI test-splitting/atomization and Vitest 4 support).
      @nx/vite still supports Vitest today but that support sunsets at Nx
      v23 — new clearline-web test targets should be generated against
      @nx/vitest directly, not @nx/vite's legacy Vitest support, so setup
      docs and generator commands don't go stale.
    alternatives_considered: []
    research_sources:
      - url: 'https://www.npmjs.com/package/vitest'
        note: 'Vitest latest stable 4.1.9 (5.0 in beta), active maintenance. Accessed 2026-06-30.'
      - url: 'https://github.com/testing-library/react-testing-library/releases'
