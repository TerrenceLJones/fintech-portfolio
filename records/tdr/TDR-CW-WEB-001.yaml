# ---------------------------------------------------------------------------
# Infrastructure providers
# ---------------------------------------------------------------------------
infrastructure_providers:
  frontend_hosting:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'Vercel (Hobby, free tier)'
    fit_confirmation: >
      Confirmed to cover a Vite SPA correctly — Vercel's zero-config
      framework preset for Vite deploys a static build (output directory
      `dist`) with no server-side rendering required, matching
      clearline-web's architecture exactly.
    cost_estimate_monthly_usd: 0

  ci_cd_provider:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'GitHub Actions'
    fit_confirmation: 'No app-specific concern; nx affected scoping applies once clearline-web has real build/test targets.'
    cost_estimate_monthly_usd: 0

  error_tracking_provider:
    inherited_from: TDR-PLATFORM-001
    override: false
    selected: 'Sentry (Developer/free plan)'
    fit_confirmation: '@sentry/react SDK, one DSN scoped to clearline-web.'
    cost_estimate_monthly_usd: 0

  anthropic_api_access:
    status: real_and_required
    selected: "Anthropic API (Claude Sonnet 5) — direct API key, proxied through the mock backend layer (never exposed client-side, per plan's Security Patterns section)"
    decision_type: new_for_this_app
    rationale: >
      The one genuinely real, non-mocked external dependency in this app.
      Invoice-extraction calls hit the real Anthropic API even though
      everything else (ledger, payments, approvals, transfers) is mocked.
      See technology_decisions.ai_integration for model choice and
      pricing detail.
    required_env_vars:
      - name: 'ANTHROPIC_API_KEY'
        scope: 'per-app, server-side only (never shipped to the client bundle)'
    cost_estimate_monthly_usd: '0.57–2.28 (see technology_decisions.ai_integration.cost_estimate_monthly_usd)'

  # --- Mocked, deliberately never real for this project -------------------
  database_provider:
    status: mocked_no_provider
    rationale: >
      No real database. The ledger, idempotency store, and payment-intent
      state are all in-memory, held by the libs/mock-backend service
      layer (see mock_backend_architecture below), per
      mock-backend-architecture.md. This is a deliberate project
      characteristic, not a "deferred" decision awaiting a future trigger
      — unlike the platform TDR's database_provider entry, which IS
      deferred until a real backend exists somewhere in the portfolio.
      For clearline-web specifically, there will never be a real database
      within this project's scope.
    cost_estimate_monthly_usd: 0

  backend_hosting:
    status: mocked_no_provider
    rationale: >
      Confirmed from the plan: apps/clearline-api-mock is an MSW +
      Express mock that runs locally and in CI — it is never deployed as
      a hosted service. There is no backend_hosting provider to select
      for this app, now or later.
    cost_estimate_monthly_usd: 0

  auth_identity_provider:
    status: mocked_no_provider
    rationale: >
      RBAC (Employee/Finance Manager/Controller/Admin) and both static
      and dynamic separation-of-duties rules are modeled client-side (UI
      hiding) and enforced server-side within the mock service layer, per
      the plan's Security Patterns section. No real auth/identity
      provider (e.g. Auth0, Clerk, Cognito) is used or needed.
    cost_estimate_monthly_usd: 0

  payment_rails:
    status: explicitly_out_of_scope
    rationale: >
      No real money movement occurs anywhere in this project. All
      transfers post to the in-memory mock ledger only. Flagged clearly
      so no downstream reader mistakes any part of this app for a real
      payments integration — this is a frontend demo of payment UX
      patterns (idempotency, step-up auth, approval routing), not a
      payments product.
    cost_estimate_monthly_usd: 0

  real_time_websocket_infra:
    status: mocked_no_provider
    rationale: >
      The card-transaction-feed WebSocket is served by MSW v2's
      WebSocket interception (ws.link), part of the mock backend service
      layer, not a hosted real-time infrastructure provider (e.g. Pusher,
      Ably, a self-hosted WS server). See mock_backend_architecture below
      for the fault-injection hooks this enables.
    cost_estimate_monthly_usd: 0

# ---------------------------------------------------------------------------
# Mock backend architecture (GraphQL addendum)
# ---------------------------------------------------------------------------
# Closes a gap this TDR itself flagged: technology_decisions.api_style_and_
# graphql_client.mock_backend_gap_flag and validation.open_items_for_human_
# review both referenced this section before it existed. Not a new researched
# decision — it applies mock-backend-architecture.md's already-decided
# services-first/handlers-second pattern (TDR-PLATFORM-001 ADR-006) to the
# GraphQL client choice made above, and records where that pattern's existing
# REST-only handler inventory needs one net-new file.
mock_backend_architecture:
  inherits_from: 'mock-backend-architecture.md (services-first, handlers-second) + TDR-PLATFORM-001.shared_mock_backend_strategy (ADR-006: no hosted backend, no Pact)'
  handler_layer:
    existing_pattern: >
      mock-backend-architecture.md documents REST-shaped MSW v2 handlers only
      (libs/mock-backend/handlers/{transfers,ledger,payments,websocket}.handlers.ts),
      each a thin HTTP adapter in front of a real, stateful TypeScript service
      (LedgerService, IdempotencyService, PaymentIntentService per its worked example).
    gap_closed_by_this_section: >
      This app's api_style_and_graphql_client decision (GraphQL + Apollo Client) means
      the data-dense dashboard views are queried via GraphQL, not REST — a case the
      addendum's handler inventory doesn't cover. Add
      libs/mock-backend/handlers/dashboard.graphql.handlers.ts using MSW v2's
      graphql.query/graphql.mutation link. It follows the identical services-first
      pattern: the handler resolves a query/mutation by calling into the same
      LedgerService/PaymentIntentService/ApprovalService instances the REST handlers
      already use, never a second, parallel fake data source — one source of mock
      state regardless of whether a given screen queries through Apollo or a
      REST-style fetch.
    apollo_cache_note: >
      Apollo Client's normalized cache keys entities by __typename + id; MSW's
      GraphQL mock resolvers must include __typename on every returned object (see
      technology_decisions.api_style_and_graphql_client.implementation_note) or cache
      normalization silently fails and the UI won't update after a mutation.
    client_agnosticism_confirmed: >
      MSW v2's GraphQL support is documented as client-agnostic (Apollo, Relay, and
      urql equally supported per mswjs.io/docs/graphql/), so this handler file needs
      no Apollo-specific MSW configuration beyond the __typename note above.
  schema_and_codegen:
    schema_location: 'libs/contracts (as SDL schema file(s), once authored)'
    codegen_tool: >
      GraphQL Code Generator, Apollo 4 "client preset" — see
      technology_decisions.api_style_and_graphql_client.implementation_note; not the
      older typescript-react-apollo generated-hooks preset, which Apollo Client 4.0
      broke compatibility with.
    generated_output_convention: >
      Codegen output belongs in a dedicated libs/contracts/src/generated/ subfolder,
      committed to git and produced by a package.json "generate" script — matching
      the committed-generated-output convention already used by libs/design-tokens
      and libs/icons (a generate script writes tracked files, reviewed like normal
      code) — kept separate from hand-written contract types (e.g. Money in
      libs/contracts/src/money.ts) so neither needs untangling from the other later.
    status: >
      Not yet implemented — no GraphQL schema exists yet. Schema authoring should
      follow the domain libs (ledger, payments, approvals) it describes, per this
      project's own build sequencing, rather than precede them and risk a schema
      that doesn't match the real domain shapes once built.
  websocket_layer:
    note: >
      Unaffected by the GraphQL decision — the card-transaction feed continues to use
      MSW v2's ws.link WebSocket interception exactly as documented in
      mock-backend-architecture.md's "WebSocket mocking for real-time feeds" section,
      including its fault-injection hooks (injectSequenceGap, injectDisconnect,
      injectStaleFeed). GraphQL subscriptions were not selected as this feed's
      transport; WebSocket + ws.link stands.

