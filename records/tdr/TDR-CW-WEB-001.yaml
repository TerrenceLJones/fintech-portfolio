# ---------------------------------------------------------------------------
# Validation
# ---------------------------------------------------------------------------
validation:
  research_currency:
    status: confirmed
    note: >
      All 7 researched categories were sourced live on 2026-06-30 via
      parallel research agents, the same date as this TDR's decision_date
      — within the 30-day currency requirement. Primary/official sources
      (npm registry, official docs/blogs, GitHub releases) were
      prioritized over secondary comparison content; where only secondary
      sources existed (e.g. company-specific GraphQL client usage), that
      gap is explicitly flagged rather than papered over.
  compatibility_check:
    status: confirmed
    findings:
      - 'React 19.2 + Vite 7.3 + @nx/vite: documented, first-party, no conflict.'
      - 'TypeScript 6.0.3 (platform baseline) + React 19.2 + Vite 7.3: standard combination, no known conflicts.'
      - 'XState v5 + React (via @xstate/react): standard, well-documented pairing, no conflict.'
      - 'TanStack Query + React 19: no conflict; retry/mutation lifecycle APIs used are stable v5 features.'
      - 'Apollo Client 4.2.4 + MSW v2 GraphQL handlers: MSW is explicitly documented as client-agnostic; __typename note documented above. No conflict.'
      - "Radix (unified radix-ui package) + Tailwind v4 + React 19: standard 'unstyled primitives + utility CSS' pairing, no conflict."
      - "Vitest 4.1.9 + Nx: first-party via the new @nx/vitest plugin (Nx 22+) — do not use @nx/vite's legacy Vitest support, which sunsets at Nx v23. See technology_decisions.testing_stack.nx_integration_note."
      - 'Playwright 1.61.0 + fast-check 4.8.0: independent of framework choice, no conflict with any of the above.'
      - 'Anthropic API (Claude Sonnet 5) structured outputs (zodOutputFormat) + TypeScript 6.0.3: current GA feature, no conflict.'
    open_items_for_human_review:
      - "GraphQL client: Apollo Client was chosen over urql on ecosystem-recognition grounds, but direct confirmation of Ramp/Brex/Mercury's actual internal client choice was not found — see technology_decisions.api_style_and_graphql_client.human_review_flag."
      - "The project plan's claim that Stately/XState docs 'explicitly position payment-authorization flows... as canonical use cases' could not be verified from official sources — softened in this TDR; see technology_decisions.workflow_state_modeling.plan_claim_correction."
      - "mock-backend-architecture.md's documented handler inventory is REST-only and doesn't yet include a GraphQL handler file for the dashboard queries implied by the api_style decision. The concrete recommendation (a new dashboard.graphql.handlers.ts, services-first per the existing pattern) is now documented in mock_backend_architecture.handler_layer below — that closes the documentation gap this TDR previously left dangling (three 'see mock_backend_architecture below' references with no such section). The code itself is still unwritten, since no mock-backend handlers of any kind exist yet — not a contradiction, just not yet implemented."
      - 'Vite version pin (7.3.x, conservative) vs. Vite 8.x (newer, Rolldown-based) is a judgment call between stability margin and newer-tooling signal — either is technically valid.'
  no_contradiction_with_plan_caveats:
    status: confirmed
    note: >
      Every infrastructure_providers entry and the mock_backend_architecture
      section explicitly restate or are consistent with
      clearline-plan.md's Caveats section, in particular: "This is a
      frontend demo, not a real financial system," the deliberate
      exclusion of mobile scope, and the explicitly self-reported (not
      independently audited) nature of the Ramp Agents-for-AP statistics
      referenced in technology_decisions.ai_integration's motivating use
      case. Nothing in this TDR overclaims real backend, real money
      movement, or production financial-system status.
