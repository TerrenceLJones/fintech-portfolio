metadata:
  idr_id: IDR-CW-WEB-001
  epic_id: CW-WEB-001
  decision_scope_level: app
  title: 'clearline-web — App Baseline Infrastructure Decisions'
  tdr_reference: /records/tdr/TDR-CW-WEB-001.yaml
  generated_by: 'DevOps Agent (Mode 2)'
  applies_to_apps:
    - clearline-web

# ---------------------------------------------------------------------------
# Provider selections — read verbatim from TDR-CW-WEB-001.infrastructure_providers.
# Technology Strategy Agent already researched and selected these; this IDR
# documents HOW they get set up, not WHICH provider to use.
#
# Three providers below are INHERITED, UNCHANGED from TDR-PLATFORM-001 and
# were already provisioned during the platform baseline (confirmed live:
# apps/clearline-web/.env.local already carries a populated SENTRY_DSN, and
# the vercel CLI is already a declared dependency). They are listed here for
# completeness and because this app-baseline TDR resolves one framework-
# dependent detail each provider was left TBD on. The only genuinely NEW
# provider for this epic is Anthropic API.
# ---------------------------------------------------------------------------
providers:
  frontend_hosting:
    selected: 'Vercel'
    plan: 'Hobby (free tier)'
    scope: per_app
    apps: ['clearline-web']
    status: already_provisioned_at_platform_baseline
    cost_estimate_monthly_usd: 0
    rationale: >
      Inherited unchanged from TDR-PLATFORM-001. This TDR (CW-WEB-001)
      confirms fit for the specific build output: Vite's static `dist`
      output matches Vercel's zero-config Vite framework preset exactly, no
      SSR required. No new provisioning action — this is a fit
      re-confirmation, not a new setup step.
    setup_guide: /infrastructure/setup-guides/vercel-setup.md
    known_caveats:
      - 'Confirm the Vercel Project → Settings → General → Framework Preset reads "Vite" (should auto-detect once real Vite config files exist) and Output Directory is "dist" before the first production deploy.'

  ci_cd_provider:
    selected: 'GitHub Actions'
    plan: 'Free (private repo)'
    scope: shared
    apps: ['clearline-web']
    status: already_provisioned_at_platform_baseline
    cost_estimate_monthly_usd: 0
    rationale: >
      Inherited unchanged from TDR-PLATFORM-001. No new CI/CD provider
      decision for this epic. One planned-but-not-yet-enabled CI addition is
      documented below (GraphQL schema validation) — see
      known_caveats and github-actions-setup.md.
    setup_guide: /infrastructure/setup-guides/github-actions-setup.md
    known_caveats:
      - 'RESOLVED (US-CW-001, 2026-07-02): build/test/dev steps are now real — apps/clearline-web has a real vite.config.mts, vitest.config.mts, and package.json dev/build/test/lint/type-check scripts. lint/type-check CI steps have been real since PLATFORM-001.'
      - 'A GraphQL schema-validation CI step is a reasonable future addition now that api_style_and_graphql_client is decided (GraphQL + Apollo Client), but no GraphQL schema exists in the repo yet (mock-backend handlers are still REST-only per TDR mock_backend_gap_flag). NOT added to the live workflow in this run to avoid a step with nothing to validate against — see github-actions-setup.md Configuration for CW-WEB-001.'

  error_tracking_provider:
    selected: 'Sentry'
    plan: 'Developer (free tier)'
    scope: per_app
    apps: ['clearline-web']
    status: already_provisioned_at_platform_baseline
    cost_estimate_monthly_usd: 0
    rationale: >
      Inherited unchanged from TDR-PLATFORM-001 — the clearline-web DSN was
      already created and is already populated in apps/clearline-web/.env.local.
      This TDR resolves the one thing platform baseline left TBD: the
      framework-specific SDK package and env-var prefix. Framework is now
      Vite + React, so the SDK is @sentry/react and the env var MUST be
      renamed from the placeholder SENTRY_DSN to VITE_SENTRY_DSN — Vite only
      exposes import.meta.env.* variables to client code when prefixed with
      VITE_; an unprefixed SENTRY_DSN would silently be undefined in the
      browser bundle.
    setup_guide: /infrastructure/setup-guides/sentry-setup.md
    known_caveats:
      - 'RESOLVED (US-CW-001, 2026-07-02): apps/clearline-web/.env.local now uses VITE_SENTRY_DSN, and @sentry/react + @sentry/cli are declared dependencies in apps/clearline-web/package.json. OPEN FOLLOW-UP: no Sentry.init() call exists yet anywhere in apps/clearline-web/src (main.tsx does not initialize it) — the SDK is installed but not wired up. Track this as a small remaining task, not a records gap.'
      - 'Confirm CSP allows the Sentry beacon if clearline-web ever sets a strict Content-Security-Policy (carried over caveat from IDR-PLATFORM-001).'

  anthropic_api:
    selected: 'Anthropic API — Claude Sonnet 5 (claude-sonnet-5)'
    plan: 'Pay-as-you-go, no free tier (usage-based)'
    scope: per_app
    apps: ['clearline-web']
    status: new_for_this_epic
    cost_estimate_monthly_usd: '0.57–2.28 (standard pricing) / 0.38–1.52 (introductory pricing through 2026-08-31), at 50-200 invoice-extraction calls/month'
    free_tier: "None — Anthropic API is metered pay-as-you-go from the first call. Cost at this app's expected volume is trivial (see cost estimate)."
    rationale: >
      The one genuinely real, non-mocked external dependency in clearline-web.
      Used for invoice-extraction / GL-code-suggestion calls (Claude Sonnet
      5, chosen over Opus 4.8 / Haiku 4.5 / Fable 5 — see
      TDR-CW-WEB-001.technology_decisions.ai_integration for full model
      comparison and pricing). Every other provider in this app is either
      inherited-unchanged (Vercel, GitHub Actions, Sentry) or mocked
      (database, auth, backend hosting, payment rails, real-time
      infrastructure — see TDR-CW-WEB-001.infrastructure_providers).
    setup_guide: /infrastructure/setup-guides/anthropic-api-setup.md
    known_caveats:
      - 'ARCHITECTURE OPEN ITEM: TDR-CW-WEB-001 requires ANTHROPIC_API_KEY be server-side only, "proxied through the mock backend layer, never exposed client-side." However libs/mock-backend/src/browser.ts intercepts requests via an in-browser MSW Service Worker — that code executes in the client, not on a real server. libs/mock-backend/src/server.ts (Node-based MSW, via setupServer) is used for tests/CI, not a live request path for the running app. As of this TDR, no real server-side process exists in this repo to host the Anthropic proxy call (TDR-CW-WEB-001 itself notes apps/clearline-api-mock as an "MSW + Express mock that runs locally and in CI" but that app directory has not been scaffolded yet). DevOps Agent flags this rather than resolving it — Engineering Agent must decide the concrete server-side execution path (e.g. a small Node/Express process under apps/clearline-api-mock, or a Vite dev-server middleware plugin for local/demo use plus a Vercel serverless function for any hosted preview) before ANTHROPIC_API_KEY can safely be wired up. Do not add ANTHROPIC_API_KEY to any client-readable env prefix (no VITE_ prefix) under any resolution of this open item.'
      - "No free tier — unlike the other three providers in this TDR, cost is not zero, though at this app's expected volume it is well under $3/month."

  database_provider:
    selected: 'Not Required'
    status: mocked_no_provider_never_planned
    rationale: >
      Confirmed by TDR-CW-WEB-001 as a deliberate, permanent app
      characteristic (not a "deferred" decision like the platform TDR's
      entry) — ledger, idempotency store, and payment-intent state are all
      in-memory within libs/mock-backend. There will never be a real
      database for clearline-web within this project's scope.

  auth_provider:
    selected: 'Not Required'
    status: mocked_no_provider_never_planned
    rationale: >
      RBAC and separation-of-duties rules are modeled client-side (UI
      hiding) and enforced within the mock service layer per
      TDR-CW-WEB-001's Security Patterns reference. No real auth/identity
      provider is used or needed.

  backend_hosting:
    selected: 'Not Required'
    status: mocked_no_provider_never_planned
    rationale: >
      The MSW + Express mock backend runs locally and in CI only — it is
      never deployed as a hosted service.

  payment_rails:
    selected: 'Not Required'
    status: explicitly_out_of_scope
    rationale: >
      No real money movement occurs anywhere in this project. All transfers
      post to the in-memory mock ledger only.

  real_time_provider:
    selected: 'Not Required'
    status: mocked_no_provider_never_planned
    rationale: >
      The card-transaction-feed WebSocket is served by MSW v2's WebSocket
      interception (ws.link) within libs/mock-backend, not a hosted
      real-time infrastructure provider.

# ---------------------------------------------------------------------------
# Provider SDK / library dependencies
# ---------------------------------------------------------------------------
provider_dependencies:
  sentry:
    packages:
      - name: '@sentry/react'
        version: 'latest'
        type: 'production'
        install_in: ['apps/clearline-web']
        purpose: 'Sentry error tracking SDK for React 19 + Vite. Resolves the "TBD" placeholder from IDR-PLATFORM-001 now that the frontend framework is known.'
  anthropic:
    packages:
      - name: '@anthropic-ai/sdk'
        version: '0.109.0'
        type: 'production'
        install_in: ['location TBD — wherever Engineering Agent resolves the server-side proxy execution path (see anthropic_api.known_caveats above); NOT apps/clearline-web client bundle']
        purpose: 'Anthropic API client for invoice-extraction calls, using client.messages.parse() + zodOutputFormat() per TDR-CW-WEB-001.technology_decisions.ai_integration.'
  vercel:
    packages: []
    note: 'vercel CLI already present in apps/clearline-web/package.json dependencies from platform baseline — no change.'
  github_actions:
    packages: []
    note: 'No SDK packages required — GitHub Actions is accessed via workflow YAML, not an npm package.'

