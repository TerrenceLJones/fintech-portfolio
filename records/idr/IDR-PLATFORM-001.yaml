metadata:
  idr_id: IDR-PLATFORM-001
  epic_id: PLATFORM-001
  decision_scope_level: platform
  title: "fintech-portfolio — Platform Baseline Infrastructure Decisions"
  tdr_reference: /specs/tdr/TDR-PLATFORM-001.yaml
  generated_by: "DevOps Agent (Mode 2)"
  applies_to_apps:
    - clearline-web

# ---------------------------------------------------------------------------
# Provider selections — read verbatim from TDR-PLATFORM-001.infrastructure_providers.
# Technology Strategy Agent already researched and selected these; this IDR
# documents HOW they get set up, not WHICH provider to use.
# ---------------------------------------------------------------------------
providers:
  frontend_hosting:
    selected: "Vercel"
    plan: "Hobby (free tier)"
    scope: per_app
    apps: ["clearline-web"]
    cost_estimate_monthly_usd: 0
    free_tier: >
      100GB Fast Data Transfer/mo, 1M serverless function invocations, 1M
      Edge Requests, 4 Active CPU-hours/mo, 200 projects (25 per connected
      Git repo), unlimited preview deployments, 45-min build cap, 1
      concurrent build, 300-second max function duration. Hobby deployments
      default to 30-day retention.
    rationale: >
      Most mature native Nx/pnpm monorepo tooling of the options compared —
      each app subdirectory becomes its own Vercel Project with its own URL,
      native workspace detection, and a documented nx-ignore mechanism to
      skip building apps unaffected by a given change. Selected over Netlify
      (recent credit-based pricing churn, less automatic Nx affected-skip)
      and Cloudflare Pages (5-projects-per-repo cap, thinner first-party Nx
      docs). See TDR-PLATFORM-001 for full comparison.
    setup_guide: /infrastructure/setup-guides/vercel-setup.md
    known_caveats:
      - "Hobby tier is restricted to non-commercial personal use per Vercel's Fair Use Guidelines."
      - "1 concurrent build on Hobby — independent app builds queue/serialize rather than running in parallel."

  ci_cd_provider:
    selected: "GitHub Actions"
    plan: "Free (private repo)"
    scope: shared
    apps: ["clearline-web"]
    cost_estimate_monthly_usd: 0
    free_tier: >
      Unlimited minutes on public repos; 2,000 minutes/month on private
      repos; 20 concurrent jobs total (max 5 concurrent macOS); 10GB cache
      per repo; 500MB artifact storage.
    rationale: >
      Free and unlimited for public repos, 2,000 min/month for private repos
      with 20 concurrent jobs. Best first-party Nx tooling fit (built-in
      `nx g ci-workflow --ci=github` generator), pairs naturally with
      `nx affected` to avoid full-monorepo rebuilds. Selected over CircleCI
      (no benefit at this scale, adds a second vendor) and GitLab CI
      (400 min/month free tier too small). See TDR-PLATFORM-001 for full
      comparison.
    setup_guide: /infrastructure/setup-guides/github-actions-setup.md
    known_caveats:
      - "Workflows in this repo deploy nothing directly — Vercel's GitHub integration handles deploys on push/PR; GitHub Actions is scoped to lint/test/build/type-check verification only."

  error_tracking_provider:
    selected: "Sentry"
    plan: "Developer (free tier)"
    scope: per_app
    apps: ["clearline-web"]
    cost_estimate_monthly_usd: 0
    free_tier: "5,000 error events/month, unlimited projects, 30-day retention, single user, no card required."
    rationale: >
      Free Developer plan costs nothing and provides real value pre-launch —
      catching JS errors during demos/walkthroughs, demonstrating
      observability tooling as a skill. One DSN per app (not a single shared
      DSN across the portfolio) so each demo app's errors triage
      independently. See TDR-PLATFORM-001 technology_decisions.error_tracking
      for full rationale, including the revisit triggers if the free-tier
      ceiling is approached.
    setup_guide: /infrastructure/setup-guides/sentry-setup.md
    known_caveats:
      - "Confirm CSP allows the Sentry beacon if clearline-web ever sets a strict Content-Security-Policy — documented failure mode for silent SDK breakage."
      - "Sentry SDK package is framework-specific (e.g. @sentry/nextjs vs @sentry/react) — exact package TBD until TDR-CLEARLINE-001 selects the frontend framework."

  database_provider:
    selected: "Not Required"
    status: deferred_until_real_backend_required
    rationale: "No app in this portfolio has a real backend yet; decide for real when the first app that needs one is scoped. See TDR-PLATFORM-001."

  auth_provider:
    selected: "Not Required"
    status: deferred_until_real_backend_required
    rationale: "No app in this portfolio has a real backend yet; decide for real when the first app that needs one is scoped. See TDR-PLATFORM-001."

  backend_hosting:
    selected: "Not Required"
    status: deferred_until_real_backend_required
    rationale: "No app in this portfolio has a real backend yet; decide for real when the first app that needs one is scoped. See TDR-PLATFORM-001."

  real_time_provider:
    selected: "Not Required"
    status: deferred_until_real_backend_required
    rationale: >
      No app has a real backend yet. Real-time demo behavior (live feed UX)
      is already covered by MSW v2's WebSocket interception
      (libs/mock-backend) — this entry is specifically about a real, hosted
      real-time infrastructure provider, a separate and not-yet-needed
      decision. See TDR-PLATFORM-001.

# ---------------------------------------------------------------------------
# Provider SDK / library dependencies
# ---------------------------------------------------------------------------
provider_dependencies:
  sentry:
    packages:
      - name: "Framework-specific Sentry SDK (e.g. @sentry/nextjs, @sentry/react) — TBD"
        version: "latest"
        type: "production"
        install_in: ["apps/clearline-web"]
        purpose: "Sentry error tracking SDK. Exact package depends on the frontend framework selected in TDR-CLEARLINE-001."
  vercel:
    packages:
      - name: "vercel"
        version: "latest"
        type: "devDependency"
        install_in: ["workspace root (optional)"]
        purpose: "Vercel CLI — optional, only needed for manual/local preview deploys outside the Git integration flow."
  github_actions:
    packages: []
    note: "No SDK packages required — GitHub Actions is accessed via workflow YAML, not an npm package."

