name: Chromatic - ui

# Publishes Storybook to Chromatic and runs visual regression tests.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: chromatic-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'libs/ui/**'
              - 'libs/design-tokens/**'
              - 'libs/icons/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'nx.json'
              - 'tsconfig.base.json'

  chromatic:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for Chromatic baseline comparison

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v18
        with:
          workingDir: libs/ui
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          exitZeroOnChanges: true
