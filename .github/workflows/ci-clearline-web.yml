name: CI - clearline-web

# Verification only — does NOT deploy. Vercel's GitHub integration handles deploys.

on:
  push:
    branches: [main]
    paths:
      - 'apps/clearline-web/**'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
  pull_request:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-clearline-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/clearline-web/**'
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'nx.json'
              - 'tsconfig.base.json'

  verify:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for `nx affected`

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @fintech-portfolio/ui --filter @fintech-portfolio/clearline-web exec playwright install --with-deps chromium

      - name: Derive base/head for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm exec nx affected --target=lint --parallel=3

      - name: Type-check affected
        run: pnpm exec nx affected --target=type-check --parallel=3

      - name: Test affected
        run: pnpm exec nx affected --target=test --parallel=3

      - name: Build affected
        run: pnpm exec nx affected --target=build --parallel=3

      - name: E2E affected
        run: pnpm exec nx affected --target=e2e --parallel=1

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/clearline-web/playwright-report/
          retention-days: 14
