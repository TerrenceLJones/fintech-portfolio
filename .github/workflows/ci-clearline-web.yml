name: CI - clearline-web

# Verification only — does NOT deploy. Vercel's GitHub integration handles deploys.

on:
  push:
    branches: [main]
    paths:
      - 'apps/clearline-web/**'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
  pull_request:

permissions:
  contents: read
  actions: read
  pull-requests: write # coverage report comment

concurrency:
  group: ci-clearline-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'apps/clearline-web/**'
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'nx.json'
              - 'tsconfig.base.json'

  verify:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for `nx affected`

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter @clearline/ui --filter @clearline/clearline-web exec playwright install --with-deps chromium

      - name: Derive base/head for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm exec nx affected --target=lint --parallel=3

      - name: Type-check affected
        run: pnpm exec nx affected --target=type-check --parallel=3

      - name: Test affected (with coverage)
        run: pnpm exec nx affected --target=test:coverage --parallel=3

      # Post a per-project coverage table to the PR. Each step is guarded by the
      # existence of that project's coverage-summary.json, so only projects that
      # `nx affected` actually tested get a section — and none run on push-to-main.
      - name: Coverage report — clearline-web
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('apps/clearline-web/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: clearline-web
          working-directory: apps/clearline-web

      - name: Coverage report — ui
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('libs/ui/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: ui
          working-directory: libs/ui

      - name: Coverage report — mock-backend
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('libs/mock-backend/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: mock-backend
          working-directory: libs/mock-backend

      - name: Coverage report — design-tokens
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('libs/design-tokens/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: design-tokens
          working-directory: libs/design-tokens

      - name: Coverage report — icons
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('libs/icons/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: icons
          working-directory: libs/icons

      - name: Coverage report — demo-beacon
        if: ${{ github.event_name == 'pull_request' && !cancelled() && hashFiles('libs/demo-beacon/coverage/coverage-summary.json') != '' }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: demo-beacon
          working-directory: libs/demo-beacon

      - name: Build affected
        run: pnpm exec nx affected --target=build --parallel=3

      - name: E2E affected
        run: pnpm exec nx affected --target=e2e --parallel=1

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/clearline-web/playwright-report/
          retention-days: 14
