# User Story
user_story:
  persona: 'business owner whose KYB onboarding has just been approved'
  capability: 'have an Organization record created for my business the moment onboarding is approved, with myself assigned as its Owner — the one role with non-removable, non-self-demotable authority over the org'
  business_value: 'my business has a durable account entity distinct from my own login, with clear, defensible authority over who can join it and what they can do, from the moment my business is verified'
  description: |
    As a business owner whose KYB onboarding has just been approved
    I want an Organization record to be created for my business, with myself assigned the Owner role on it
    So that my business has a real account entity with an accountable controlling person, ready to have teammates added to it, consistent with the beneficial-ownership identity I already verified during onboarding

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given my onboarding review completes successfully (US-CW-004 AC-08)
      When full transacting capability is unlocked
      Then an Organization record is created, keyed to the business I onboarded (its legal name and EIN)
      And I am assigned the Owner role on that Organization
      And this happens atomically with the approval — no state exists where the business is approved but has no Organization or no Owner
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I am the Owner of an Organization
      Then I hold every capability Controller holds (US-CW-006), plus exclusive organization-administration authority: inviting teammates, assigning or changing roles, and removing members (US-CW-031)
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I am the Owner of an Organization
      Then I cannot be removed from the organization by anyone, including another Admin
      And I cannot demote myself out of the Owner role
      And no capability in this story or US-CW-031 offers an action that would leave the Organization without an Owner
    status: 'active'
  - id: 'AC-04'
    description: |
      Given an Organization already exists for a given EIN
      When onboarding for that same EIN reaches the approval step a second time
      Then no second Organization is created
      And this case is prevented upstream by US-CW-004 AC-07's duplicate-EIN check, before onboarding ever reaches approval
    status: 'active'

# Technical Notes
technical_notes: |
  No Organization/Org/Tenant type exists anywhere in the codebase today — this story introduces it.
  The nearest existing entity is the onboarding domain's business record (libs/contracts/src/onboarding.ts:
  BusinessInfo, OnboardingStatusResponse.businessId), which is a distinct, unconnected concept from the
  auth domain's SeedUser (libs/mock-backend/src/fixtures/users.fixture.ts: { id, email, passwordHash,
  verified } — no role or orgId field). This story's Organization record should key off the same
  businessId onboarding already produces, rather than minting a new identifier space, and should extend
  SeedUser (or its persistence wrapper) with an orgId and a role field rather than duplicating identity
  data. AuthService currently has no concept of role at all; this is the first story to add one.

  Atomicity matters here specifically because approval (US-CW-004 AC-08) and Organization/Owner creation
  are two separate writes against the mock backend's in-memory store — they must be committed as a single
  transition (or the approval step itself must not be considered complete until both succeed) so a partial
  failure can never leave an approved business with no accountable Owner. This is the same "no dangling
  state" concern EPIC-CW-016's enumeration-safety work already applied to sign-up.

  Owner's non-removability (AC-03) has no ownership-transfer escape hatch in this story or US-CW-031 —
  deliberately deferred as a follow-up, flagged in US-CW-031's technical_notes, since nothing in the
  current registry exercises a scenario requiring one (e.g. the original Owner leaving the company).

# Edge Cases
edge_cases: |
  - Onboarding approval succeeding but Organization/Owner creation failing partway through, which must not be reachable as a persisted state
  - A second onboarding attempt for a business whose EIN already has an approved Organization (prevented upstream by US-CW-004 AC-07, not by this story)
  - (inferred) Any future action attempting to remove the Owner or leave an Organization Owner-less must be rejected at the data-access layer, not merely hidden in the UI

# Implementation Status
implementation_status: |
  Implemented by EPIC-CW-017 (2026-07-18). An Organization entity now exists in the mock backend:
  AuthService seeds/holds organizations (orgsById/orgIdByEin) and SeedUser carries orgId + joinedAt.
  On KYB approval, POST /api/onboarding/review/submit calls AuthService.provisionOrganizationForOwner,
  which creates the org keyed to the verified business's legal name + EIN and assigns the creator Owner
  (Controller tier, unlimited limit, isOwner) as one atomic transition — idempotent per EIN, so a
  repeat never mints a second org (AC-04). Owner non-removability/non-self-demotion (AC-03) is enforced
  at the data-access layer: changeMemberRole/removeMember reject any Owner target with owner_protected,
  independent of the UI. See libs/mock-backend/src/services/auth.service.ts, its onboarding handler, and
  libs/domain/auth/src/owner-provisioning-policy.ts, with coverage in auth.service.team.test.ts and
  onboarding.handlers.test.ts.
