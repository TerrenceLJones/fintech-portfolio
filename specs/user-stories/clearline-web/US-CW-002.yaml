# User Story
user_story:
  persona: 'logged-in Clearline user'
  capability: 'have my session and tokens managed transparently — silently refreshed when valid, safely terminated when compromised or expired, and protected from unexpected sign-outs during inactivity'
  business_value: 'I can work continuously without unexpected interruptions to legitimate activity, while the platform proactively protects my account from session-related security incidents'
  description: |
    As a logged-in Clearline user
    I want my access and refresh tokens to be silently refreshed during active use, and my session to be invalidated immediately upon signs of compromise (token replay, password change elsewhere), expiry, or prolonged inactivity
    So that I experience uninterrupted, secure sessions without my legitimate activity being interrupted or my account left exposed by a stale session

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I am logged in and actively using the dashboard
      And my access token has expired
      When I trigger any authenticated API request
      Then the client silently refreshes the access token using the refresh token cookie
      And the original request is automatically replayed
      And I see no interruption to my workflow
    status: 'active'
  - id: 'AC-02'
    description: |
      Given my refresh token has already been used once to obtain a new token
      When the same (now-stale) refresh token is presented again
      Then the server revokes the entire token family
      And I am logged out immediately on all devices
      And I see "For your security, we signed you out. Please sign in again."
      And an audit event flags this as a potential security incident
    status: 'active'
  - id: 'AC-03'
    description: |
      Given my refresh token's lifetime has elapsed
      When I attempt any authenticated action
      Then I am logged out
      And I see "Your session expired. Please sign in again."
      And I am redirected to the login page with my prior route preserved for post-login redirect
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I am logged in
      And I have been inactive for 15 minutes
      When the inactivity threshold is reached
      Then I see a warning modal at the 14-minute mark: "You'll be signed out in 60 seconds due to inactivity"
      And if I take no action within 60 seconds, I am logged out
      And my in-memory access token is cleared
      And I see "You were signed out due to inactivity. Please sign in again."
    status: 'active'
  - id: 'AC-05'
    description: |
      Given the inactivity warning modal is displayed
      When I click "Stay signed in" or interact with the page
      Then the inactivity timer resets
      And the modal closes
      And my session continues uninterrupted
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I am logged in on Device A
      And my password is changed from Device B
      When I make my next authenticated request on Device A
      Then my session on Device A is invalidated
      And I see "Your session ended. Please sign in again."
    status: 'active'
  - id: 'AC-07'
    description: |
      Given I am logged in on my laptop
      When I log in on a new device with the same account
      Then I see a notice: "You're signed in on another device. Continue here?"
      And I may choose to continue, which does not forcibly log out the other device
      And if I cancel instead, only the session just created by this login is revoked —
      the other device's session is left untouched either way
    status: 'active'

# Technical Notes
technical_notes: |
  Requires a silent-refresh interceptor on the API client that detects 401s from expired access tokens, exchanges
  the httpOnly refresh-token cookie for a new access token, and transparently replays the original request without
  surfacing the refresh to the user. Refresh tokens must be tracked as rotating token families server-side so reuse
  of a stale token triggers full-family revocation and a forced global logout, with an audit event flagged as a
  potential security incident. Inactivity tracking needs a client-side idle timer (14-minute warning, 60-second
  grace period, 15-minute hard cutoff) plus a server-side session-invalidation check (e.g., on password change) that
  is enforced on the next authenticated request rather than pushed in real time.

  This story's original scope also covered preserving an in-flight vendor-payment submission (form data and
  idempotency key) across a forced re-authentication. That behavior moved to US-CW-007 AC-06 — see EPIC-CW-001's
  notes for why — since no vendor-payment feature exists for this story to build against; US-CW-007 owns the actual
  "New Payment" form and its idempotency-key handling, and reuses this story's forced-logout/redirect mechanism to
  trigger the preserve-and-resume flow.

# Edge Cases
edge_cases: |
  - Access token expiring mid-session during active dashboard use
  - Reuse/replay of an already-consumed refresh token (signals possible theft)
  - Refresh token fully expired before any further authenticated action
  - User inactive for the full 15-minute threshold without dismissing the warning
  - User dismissing the inactivity warning to keep the session alive
  - Password changed on a different device while another device session is still active
  - Logging in on a second device while the first device's session remains active
  - Network failure occurring during the silent token refresh itself (inferred)

