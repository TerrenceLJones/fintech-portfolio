# User Story
user_story:
  persona: 'Controller / compliance-minded operator'
  capability: 'view a complete, tamper-proof, append-only record of every financial action taken in the platform — payments, approvals, card control changes, and role/permission changes — with restricted access to the log itself'
  business_value: 'I can trust that the system provides a defensible, immutable audit trail for regulatory review, internal investigations, and dispute resolution, with assurance that no one — including admins — can alter or erase history'
  description: |
    As a Controller / compliance-minded operator
    I want every financial action in the platform (payments, approvals, card control changes, role and permission changes) to be automatically recorded in an immutable, append-only audit log, with access to that log itself restricted and logged
    So that I have a defensible, tamper-proof record I can rely on for regulatory review, internal investigations, and dispute resolution

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given any user submits a payment, regardless of outcome
      When the submission occurs
      Then an audit event is recorded containing user ID, amount, recipient, timestamp, idempotency key, and outcome
    status: 'active'
  - id: 'AC-02'
    description: |
      Given an approver approves, rejects, or escalates an expense
      When the action is taken
      Then an audit event records who took the action, what action, on which expense, and when
    status: 'active'
  - id: 'AC-03'
    description: |
      Given a card limit, MCC restriction, or freeze state is changed
      When the change is saved
      Then an audit event records the prior value, the new value, who made the change, and when
    status: 'active'
  - id: 'AC-04'
    description: |
      Given an admin changes a user's role or approval limit
      When the change is saved
      Then an audit event records the prior role/limit, the new role/limit, who made the change, and when
    status: 'active'
  - id: 'AC-05'
    description: |
      Given an audit event has been recorded
      When any user (including admins) attempts to modify or delete that event
      Then the action is rejected
      And audit records may only be appended to, never altered or removed
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I am a Controller viewing the audit log
      When I open the audit log view
      Then access to the audit log itself generates an audit event
      And only Controller and Admin roles may view the audit log
    status: 'active'

# Technical Notes
technical_notes: |
  The audit log must be implemented as an append-only store (e.g. write-once/insert-only table or
  event log) with no update or delete code paths exposed at any layer, including admin tooling —
  enforcement should occur at the data-access layer, not just the UI. Payment audit events must
  capture user ID, amount, recipient, timestamp, idempotency key, and outcome; card control and
  role/permission audit events must capture prior value, new value, actor, and timestamp as a
  before/after diff. Audit log read access must be authorization-gated to Controller and Admin
  roles only, and every read of the audit log view must itself emit an audit event, implying
  audit-event writes are triggered both by mutating financial actions and by audit-log reads.
  Given the cross-cutting nature of this capability, audit event emission should be implemented
  as a shared/central mechanism invoked by payments, approvals, card controls, and admin
  role-management flows rather than duplicated per feature.

# Edge Cases
edge_cases: |
  - Payment submissions must be logged regardless of outcome, including failed or rejected submissions, not only successful ones.
  - Attempts by any user, including admins, to modify or delete an existing audit event must be rejected outright.
  - Users without Controller or Admin roles must be denied access to the audit log view entirely, not merely shown a read-only/limited version.
  - Viewing the audit log is itself an auditable action and must generate its own audit event, creating a self-referential logging requirement.
  - (inferred) Audit event writes must not be skipped or silently dropped if the triggering financial action fails partway through (e.g. a payment that errors after submission must still produce an audit record of the attempt).
  - (inferred) Bulk or automated changes (e.g. a script updating many card controls or roles at once) must still produce one audit event per discrete change rather than a single aggregated entry, to preserve per-change traceability.

# Implementation Status
implementation_status: |
  ✅ Implemented 2026-07-18 (EPIC-CW-015). A central, append-only AuditService in the mock backend
  (@clearline/mock-backend) is the single source of truth for the audit log — it exposes only record()
  and list() (no update/delete/clear at any layer), and the running app binds one shared instance that
  payments, approvals, and card-control flows all emit into via a shared resolveAuditActor seam, rather
  than the log being duplicated per feature. A unified AuditEvent contract (@clearline/contracts) carries
  actor (server-derived), category, action, an optional before→after diff, and payment meta. The
  Controller-only Audit Log view (/audit) is served by GET /api/audit-log through @clearline/data-access-audit
  (useAuditLog), rendered as the design's §18 table with the append-only assurance badge; a 403 degrades
  to AccessDenied. A page-aware Beacon guide and an e2e spec (audit.spec.ts) accompany it.
  - AC-01: POST /api/payments records a 'payment' event on every submission regardless of outcome —
    success, step-up hold, and validation rejection all logged — capturing actorId, amount, recipient,
    timestamp, idempotency key, and outcome in AuditEvent.meta.
  - AC-02: each approve/reject/escalate/reassign records an 'approval' event with who acted, the action,
    the expense (submitter + category + id), and when; a rejection carries its reason.
  - AC-03: a card freeze/unfreeze records a 'card_control' event with an Active↔Frozen before→after diff;
    issuance records the new card with its monthly limit and MCC posture.
  - AC-04: role/permission changes map to a 'role_change' category with a before→after role diff. No live
    role-change flow exists yet (team management, EPIC-CW-018, is still Planned), so this category is
    covered by the seed fixture and the ready record() seam rather than a live emission point.
  - AC-05: the append-only guarantee is enforced at the data-access layer — AuditService has no update,
    delete, remove, or clear method, and /api/audit-log exposes no write/mutate/delete route. A service
    test asserts the absence of any mutation path and that list() returns deep clones.
  - AC-06: audit:view gates the read (Controller only, re-checked server-side); a non-Controller is
    denied outright with 403, never a limited view. A successful read records a self-referential
    'audit_access' event for the caller before returning, so it tops the very list returned and is
    tinted as the viewer's own access in the table.
