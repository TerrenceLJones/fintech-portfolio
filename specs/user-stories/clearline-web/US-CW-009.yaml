  📁 Files created/modified (grouped by area):
    - apps/clearline-web/src/pages/payments/payment-status-display.ts — maps normalized statuses to neutral,
      non-alarming copy. pending_review → "This transfer is under review. We'll email you once it's complete."
      with no sanctions/watchlist/fraud terminology anywhere (AC-01); reversed → "This payment was reversed on
      {date}. The funds were returned to your account." (AC-02); an unrecognized code degrades to a neutral
      "Processing" that keeps polling rather than guessing a state (AC-03).
    - apps/clearline-web/src/pages/payments/PaymentStatusPage.tsx — renders the display and polls while
      isSettling.
    - libs/domain/payments/src/payment-status-policy.ts — normalizes raw server status codes; unknown codes
      collapse to 'processing' for the client while the raw value is preserved for logging (AC-03).
    - libs/mock-backend/src/services/payments.service.ts — a screening-matched recipient commits the intent as
      pending_review, never leaking compliance terms (AC-01). reverse() posts an additive `reversal` ledger
      entry and a payment.reversed audit event, returns the debited funds, and never edits or deletes the
      original debit; a duplicate reversal webhook is idempotent (returns existing state, posts nothing) (AC-02).
    - Tests: payment-status-display, payment-status-policy, PaymentStatusPage, payments.service (pending_review,
      reverse ok/duplicate/not-found, ledger immutability) — all green.
