# User Story
user_story:
  persona: "Owner or Admin managing their organization's team"
  capability: "invite teammates to my organization by email with an assigned role, change any member's role, and remove members — the only way anyone ever joins an organization they did not create"
  business_value: 'I can grow my team on Clearline with confidence that membership is fully under my control, and that no one can attach themselves to my organization without my say-so'
  description: |
    As an Owner or Admin of a Clearline organization
    I want to invite teammates by email with an assigned role, change existing members' roles, and remove members
    So that my organization's roster and access levels stay exactly as I intend, with no path for an outside person to join without an explicit invitation from me

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I am an Owner or Admin
      When I invite a teammate by work email and assign them a role (Employee, Finance Manager, or Controller)
      Then an enumeration-safe response is shown regardless of whether that email already has a Clearline account
      And if the email has no account, a time-limited, single-use invite link is emailed to it
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I received a valid, unexpired invite link
      When I click it and (if I have no existing account) set a password
      Then I am added to the inviting organization with the role specified in the invite
      And I am logged in and redirected to my role-appropriate dashboard, bypassing business onboarding entirely (onboarding is a one-time, per-organization step already completed by the Owner)
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I click an invite link more than 7 days after it was sent
      Then I see "This invite has expired. Ask an admin to resend it."
      And no organization membership is granted
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I am an Owner or Admin
      When I change an existing member's role
      Then the change takes effect on that member's next request, per US-CW-006 AC-05's mid-session degradation handling
      And an audit event records the prior role, new role, actor, and timestamp (US-CW-021 AC-04)
    status: 'active'
  - id: 'AC-05'
    description: |
      Given I am an Owner or Admin
      When I remove a member from the organization
      Then that member's session is invalidated on their next request and they are signed out
      And they can no longer log in to this organization
      And removing the Owner is not offered as an available action to anyone, including another Admin (US-CW-030 AC-03)
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I sign up (US-CW-029) with a work email whose domain matches an existing organization
      Then I am not automatically added to that organization
      And I am routed into standard business onboarding (US-CW-004) as if starting a new, separate organization
      And joining an existing organization is only ever possible via an invite from that organization's Owner or Admin
    status: 'active'
  - id: 'AC-07'
    description: |
      Given I am an Employee, Finance Manager, or Controller (not Owner or Admin)
      Then I do not see any team-management navigation or actions
      And the invite, role-change, and removal endpoints independently reject my requests server-side regardless of client state
    status: 'active'
  - id: 'AC-08'
    description: |
      Given I am an Owner or Admin
      When I grant Admin to an existing member
      Then that member gains the orthogonal Admin permission on their next request (US-CW-006 AC-05)
      And an audit event records the change, actor, and timestamp (US-CW-021 AC-04)
      But when I attempt to revoke Admin from a member
      Then it is permitted only if I am the Owner — an Admin can delegate Admin but can never strip it, from another Admin or from themselves
      And the role-change endpoint independently rejects a non-Owner's revoke attempt server-side, so an Admin can never lock the organization out of team management
    status: 'active'
  - id: 'AC-09'
    description: |
      Given I am an Owner or Admin viewing a pending (unaccepted) invite
      When I resend it
      Then a fresh single-use link is issued and the previously sent link is invalidated, restarting the 7-day expiry window from now
      And the invite stays on the roster under the same pending entry
      And the resend endpoint independently rejects a non-Owner/Admin caller server-side (AC-07) and records an audit event (US-CW-021 AC-04)
    status: 'active'
  - id: 'AC-10'
    description: |
      Given I am an Owner or Admin viewing a pending (unaccepted) invite
      When I revoke it
      Then the outstanding link can no longer be accepted and the invite is removed from the roster
      And the revoke endpoint independently rejects a non-Owner/Admin caller server-side (AC-07) and records an audit event (US-CW-021 AC-04)
    status: 'active'

# Technical Notes
technical_notes: |
  Invite tokens follow the same shape US-CW-029 already established for verification tokens and
  US-CW-003 for reset tokens: single-use, cryptographically random, stored hashed at rest. Expiry is
  set to 7 days (longer than sign-up's 24-hour verification window and materially longer than
  password-reset's 1-hour window) since an invite link is typically sent to someone who isn't
  expecting it and may not act on it immediately, and a compromised invite link only grants the role
  the inviter chose — not account takeover of an existing identity.

  This is the first story to give AuthService's user record a role and an orgId (see US-CW-030's
  technical_notes on SeedUser's current { id, email, passwordHash, verified } shape having neither).
  Invite acceptance for a brand-new email follows the same account-creation mechanics as US-CW-029
  (password complexity, PBKDF2-HMAC-SHA256 hashing) but skips onboarding entirely and sets orgId/role
  directly from the invite record — onboarding (US-CW-004) is a per-organization, not per-user, step
  and must never run twice for the same org.

  AC-06 is the concrete answer to whether a user can ever associate themselves with an org someone
  else created: no. Domain-matching at sign-up was considered (auto-suggesting "join Acme's
  organization?") and explicitly excluded from this story's scope — see EPIC-CW-017's notes for the
  fraud-vector rationale. AC-06 exists specifically to close off any implicit assumption that matching
  work-email domains implies shared organization membership.

  Role-change (AC-04) is the concrete actor behind US-CW-006 AC-05's previously-unspecified "an admin
  downgrades my role" — this story is what US-CW-006 AC-05 was always describing the effect of, now
  with an actual mechanism.

  Ownership transfer (reassigning Owner to a different member, e.g. before the original Owner is
  removed) is explicitly out of scope for this story, consistent with US-CW-030 AC-03's non-removability
  guarantee having no escape hatch yet. That follow-up gap is now closed by EPIC-CW-022's US-CW-043
  (Ownership Transfer), which extends this story's team domain with an atomic, re-auth-gated Owner swap —
  the supported path for an Owner who needs to leave the organization.

# Edge Cases
edge_cases: |
  - Invite sent to an email that already has a Clearline account (in this org or another) — must not silently create a duplicate account or grant unintended cross-org access
  - Invite link clicked after 7-day expiry
  - Invite link reused after already being consumed once
  - Role change or removal targeting the Owner, which must be rejected/unavailable regardless of who initiates it
  - Removed member with an active session continuing to act until their next request surfaces the revocation
  - Sign-up with a work-email domain matching an existing organization, which must route to standalone onboarding rather than implicit membership (AC-06)
  - Non-Owner/Admin attempting invite, role-change, or removal actions via direct API call, bypassing UI (AC-07)
  - (inferred) Inviting an email that is already a pending (unaccepted) invite to the same organization — should not create a second outstanding invite/token

# Implementation Status
implementation_status: |
  Implemented by EPIC-CW-017 (2026-07-18). Invite tokens follow the established single-use, hashed,
  time-limited pattern with a 7-day TTL (libs/domain/auth/src/invite-token-policy.ts). AuthService adds
  createInvite (enumeration-safe, dedupes an outstanding invite, never mints for an existing member),
  getInviteDetails, acceptInvite (creates the account directly in the inviting org with the invited
  role, skips onboarding, auto-logs-in), changeMemberRole and removeMember (both Owner-protected;
  removal revokes the member's refresh-token families so they're signed out on their next request,
  AC-05). Endpoints live in libs/mock-backend/src/handlers/team.handlers.ts: GET /api/team/members,
  POST /api/team/invites, GET/POST /api/team/invites/:token(/accept), PATCH /api/team/members/:id/role,
  DELETE /api/team/members/:id — all Owner/Admin-gated server-side (AC-07), with role changes and
  removals emitting role_change audit events (AC-04, US-CW-021). AC-08: the role-change endpoint also
  grants/revokes the orthogonal Admin flag — granting is available to any Owner/Admin, revoking is
  Owner-only (changeMemberRole rejects a non-Owner revoke with admin_revoke_forbidden, so an Admin can
  never strip Admin from another Admin or themselves), and each admin change emits its own audit event.
  team:view is now granted by isOwner OR
  isAdmin (libs/domain/auth/src/authorization-policy.ts). UI: apps/clearline-web/src/pages/team/TeamPage
  (roster, invite modal, change-role/remove dialogs) and pages/invite/InviteAcceptPage (public
  set-password → role dashboard / expired screen). Data-access lib: @clearline/data-access-team. AC-06's
  "domain match at sign-up does not auto-join" holds by construction — sign-up creates an account with
  orgId: null and routes to standalone onboarding; joining an org is only ever possible via an invite.

  AC-09 / AC-10 (pending-invite resend & revoke) added and implemented by EPIC-CW-018 (2026-07-18):
  AuthService.resendInvite re-issues a fresh single-use token and invalidates the old one (restarting the
  7-day window, keeping the same PendingInvite id), and AuthService.revokeInvite deletes the outstanding
  invite so its link no longer validates — both org-scoped (invite_not_found otherwise). Endpoints POST
  /api/team/invites/:id/resend and DELETE /api/team/invites/:id reuse the Owner/Admin authorizeAdmin gate
  (AC-07) and emit role_change audit events (AC-04). data-access-team adds useResendInvite / useRevokeInvite;
  TeamPage's pending row renders the Resend and Revoke (×, confirmed) controls per design §18.1.

  Out of scope, still a follow-up: ownership transfer (now owned by EPIC-CW-022 / US-CW-043).
