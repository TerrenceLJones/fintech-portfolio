# User Story
user_story:
  persona: 'active member working through my role''s getting-started tasks'
  capability: 'have each task tick off the moment I actually perform the action it names — never by me marking it done — and see a single, brief celebration when I complete my role''s signature first action'
  business_value: 'the checklist reflects what I have genuinely done rather than what I clicked, so it stays trustworthy, and finishing the one action that matters most feels like a real win instead of a formality'
  description: |
    As an active member working through getting-started tasks
    I want each task to complete automatically when the domain event it represents occurs — an expense
    submitted, an approval actioned, a card issued, a budget created, a teammate invited — and one modest
    celebration when I complete my role's signature action
    So that the launchpad never drifts from what the system knows I've done, I'm never asked to self-certify
    incomplete work, and the moment that matters most is acknowledged without turning into confetti on every
    click

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given a getting-started task represents a domain action (e.g. "Submit your first expense")
      When the corresponding domain event occurs (an expense is successfully submitted)
      Then that task is marked complete
      And the launchpad progress (US-CW-044) and any on-page spotlight (US-CW-046) update to reflect it
    status: 'active'
  - id: 'AC-02'
    description: |
      Given the getting-started launcher is showing
      Then there is no control anywhere to manually mark a task complete or skip it as done
      And completion is only ever reached by performing the action the task names
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I complete the task flagged as my role's signature action (US-CW-045 AC-07) — Employee: submit
        an expense; Finance Manager: action an approval; Controller: issue a card; Owner: invite a teammate
      When that task's completion is recorded
      Then a single, brief milestone celebration is shown (a Toast), naming what I accomplished
      And it is shown at most once per user per organization for that signature action
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I complete a non-signature getting-started task
      Then the task ticks off and progress advances
      And no milestone celebration fires — only the signature action celebrates (AC-03)
    status: 'active'
  - id: 'AC-05'
    description: |
      Given a getting-started action was performed before this feature could observe it (for example I had
        already submitted an expense in a prior session)
      When my task set is computed
      Then that task is shown as already complete rather than prompting me to repeat work I've done
    status: 'active'
  - id: 'AC-06'
    description: |
      Given the milestone celebration is shown
      Then its meaning is carried by an icon and text, not colour alone (Design §17)
      And it auto-dismisses and is also manually dismissible, never blocking the page
      And it respects a reduced-motion preference (no motion-based effect when reduced motion is set)
    status: 'active'

# Technical Notes
technical_notes: |
  Completion is derived from the same domain events the audit trail already records — expense submitted,
  approval actioned (US-CW-012), card issued (US-CW-014), budget created, teammate invited (US-CW-031) —
  rather than a client-owned "done" toggle. This is the design's load-bearing choice: it makes the checklist
  a read model over real activity, so it cannot claim work the system didn't see, and it is why AC-02
  forbids any manual check-off. AC-05 falls out of the same model — because completion is "has this user's
  event fired in this org," a task the user already satisfied reads as done on first render without special
  back-fill logic.

  The signature-action mapping (AC-03) reuses US-CW-045's isSignature flag; the celebration is the existing
  @clearline/ui Toast, kept intentionally modest (one line + icon) — the research's "celebrate milestones"
  lesson, deliberately scoped to the single action most tied to activation rather than firing on every step,
  so it stays a signal rather than noise. The once-per-user-per-org guard shares the persistence model with
  US-CW-044 AC-05.

  This story owns completion detection and celebration only. It updates state that US-CW-044 renders as
  progress and US-CW-046 reads to suppress a spotlight; it does not own the launcher UI, the task catalogue,
  or the on-page pointer.

# Edge Cases
edge_cases: |
  - Signature action performed via a path other than the getting-started spotlight (still completes and
    still celebrates once — completion is event-driven, not spotlight-driven — AC-01/AC-03)
  - The same action performed twice (task is already complete; no second celebration — AC-03 once-only)
  - Action performed in another tab/device (task reflects complete on next render here)
  - A pre-existing action from before the feature shipped (AC-05: shown complete, not re-prompted)
  - Reduced-motion preference set (celebration shown without motion — AC-06)
  - The last remaining task is the signature action (completing it both celebrates and retires the launcher
    per US-CW-044 AC-06)

# Implementation Status
implementation_status: |
  ✅ IMPLEMENTED 2026-07-23 (branch EPIC-CW-023/getting-started-onboarding). Completion is a server-side
  read model — a new mock-backend OnboardingTasksService keyed by userId, persisted (versioned) to
  sessionStorage like the KYB OnboardingService. It is written at the exact mutation call sites the domain
  actions run through: expense submitted, approval actioned, card issued, budget created, teammate invited,
  payment created (AC-01) — so it can never claim work the system didn't see, and a task already satisfied
  reads as done on first render (AC-05). There is no endpoint or control to mark an event task done: the
  only client writes are visit-task completion (a "go look" page reached) and the milestone latch (AC-02).
  A single milestone Toast (icon + text, positive) fires on the persona's signature action, guarded to once
  per user by a server milestoneShown flag (AC-03); non-signature completions advance progress silently
  (AC-04). The Toast auto-dismisses, is non-blocking, and respects reduced motion (AC-06). Covered by
  onboarding-tasks.service.test.ts, onboarding-tasks.handlers.test.ts (incl. event→completion integration
  for expenses and cards), and the launcher milestone tests.
  NOTE — deviation from the approved plan: three of the six emitters (expense submit, budget create, invite
  create) do NOT yet write to the audit log (they had no audit entry pre-existing, and adding one would mean
  expanding the AuditCategory contract + audit UI). Onboarding completion is instead recorded directly at
  those same mutation call sites, which fully satisfies "observed from the domain action"; wiring those three
  into the audit trail proper is a clean fast-follow.
  KNOWN LIMITATION (AC-06): the milestone reuses the shared @clearline/ui Toast + app ToastViewport per the
  design's "existing Toast" direction, which auto-dismiss on a timer and expose no manual-dismiss control;
  adding a dismiss affordance (and explicit reduced-motion handling) to that shared toast path is a follow-up
  so the "also manually dismissible" clause is fully met without a bespoke milestone toast.
