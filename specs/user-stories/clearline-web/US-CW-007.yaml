implementation_status: |
  ✅ Implemented: 2026-07-14 (EPIC-CW-004)
  📁 Files created/modified (grouped by area):
    - libs/domain/payments/src/idempotency-key.ts — UUID v4 idempotency-key generation, minted once per
      payment intent (AC-01/02); payment-retry-policy.ts — MAX_PAYMENT_RETRIES=3, PAYMENT_TIMEOUT_MS=30_000,
      full-jitter exponential backoffDelayWithJitter (AC-03/04).
    - libs/data-access/payments/src/use-idempotency-key.ts — holds the key across renders, reused on retry
      and rehydrated from the draft, reset only on a genuinely new operation (AC-02/05). use-create-payment.ts
      — sends the Idempotency-Key header, 30s AbortController timeout → PaymentTimeoutError (poll, don't
      resubmit, AC-03), retries transient 5xx/network only up to 3× with jittered backoff (AC-04), maps 409 →
      idempotency_mismatch / 403 / 422 to non-retriable PaymentValidationError (AC-05).
    - apps/clearline-web/src/pages/payments/new-payment/use-new-payment-form.ts — pessimistic submit
      (Review → confirm → "Processing…", never instant Success), submit disabled while pending, mismatch →
      fresh key + resubmit copy (AC-05); payment-draft.ts persists amount/recipient/memo + idempotency key to
      survive a mid-submission session timeout and redirect, rehydrated on return (AC-06).
    - libs/mock-backend/src/services/payments.service.ts — exactly-once server: replay of a key returns the
      original intent, same key + changed payload → idempotency_mismatch (AC-02/05); every commit writes an
      immutable debit+credit ledger pair and a payment.created audit event (AC-01).
    - Tests: idempotency-key, payment-retry-policy, use-idempotency-key, use-create-payment (timeout/retry/
      mismatch), new-payment-form, payment-draft, NewPaymentPage(.server-error), payments.service — all green.
