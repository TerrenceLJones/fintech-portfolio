# User Story
user_story:
  persona: 'Controller'
  capability: 'have vendor payments validated against available balance, daily transfer limits, and recipient account status before funds are moved'
  business_value: 'I am stopped from making invalid, over-limit, or misdirected transfers with clear, actionable error messages instead of discovering problems after the fact'
  description: |
    As a Controller
    I want vendor payments validated against available balance, daily transfer limits, and recipient account status before funds are moved
    So that I am stopped from making invalid, over-limit, or misdirected transfers with clear, actionable error messages instead of discovering problems after the fact

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given my account's available balance is $3,000.00 (derived from the ledger)
      When I attempt to submit a payment of $5,000.00
      Then the submission is blocked client-side before any network call
      And I see "You don't have enough available balance for this transfer. Available: $3,000.00."
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given my daily transfer limit is $20,000.00
      And I have already transferred $18,000.00 today
      When I attempt to submit a payment of $5,000.00
      Then I see "This exceeds your daily transfer limit of $20,000.00. Request a higher limit or enter a smaller amount."
      And a "Request limit increase" call to action is shown
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given I enter recipient details that do not match any known account
      When I submit the payment
      Then I see "We couldn't find that recipient account. Check the details and try again."
      And the recipient field is highlighted for correction
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given the recipient's account has been closed
      When I submit the payment
      Then the payment is rejected
      And I see "This recipient's account is no longer active. Contact them to get updated details."
    status: 'active'
  - id: 'AC-05'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given the recipient account matches my own account
      When I attempt to submit the payment
      Then I see "You can't transfer to the same account."
      And the submit action is blocked
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I am logged in as a Controller
      And I am on the "New Payment" form
      Given the recipient's account uses a non-USD currency
      When I enter the payment amount in USD
      Then I see a banner "This recipient uses {currency}. Review the converted amount before sending."
      And the converted amount and exchange rate are displayed before I can confirm
    status: 'active'

# Technical Notes
technical_notes: |
  Available balance and daily transfer limit checks must execute client-side prior to any network call where the
  data is already known (e.g. balance derived from the ledger), to provide immediate feedback and avoid unnecessary
  server round-trips. Daily transfer limit tracking must aggregate same-day transfers in real time. Recipient
  resolution must distinguish "not found" from "closed" from "self-match" as distinct validation failures with
  distinct messaging. Cross-currency payments require a live exchange rate lookup and explicit user confirmation of
  the converted amount before submission proceeds.

# Edge Cases
edge_cases: |
  - Submission amount exceeds available ledger-derived balance
  - Cumulative same-day transfers plus new payment exceed the daily transfer limit
  - Recipient account details do not match any known account
  - Recipient account exists but has been closed
  - Recipient account is identical to the sender's own account (self-transfer)
  - Recipient account currency differs from the payment's entered currency (USD)
  - (inferred) Exchange rate lookup fails or is stale at the moment of confirmation

# Implementation Status
implementation_status: |
  ✅ Implemented: 2026-07-14 (EPIC-CW-004)
  📁 Files created/modified (grouped by area):
    - libs/domain/payments/src/payment-validation-policy.ts — pure validatePayment gate returning a typed
      reason in priority order: invalid_amount → insufficient_balance → daily_limit_exceeded → recipient_closed
      → self_transfer. Shared verbatim by the client pre-check and the server, so the UI is never the security
      boundary (AC-01/02/04/05).
    - apps/clearline-web/src/pages/payments/new-payment/use-new-payment-form.ts — runs validatePayment against
      the ledger-derived available balance, daily limit and daily-spent before any network call, blocking
      doomed submissions client-side (AC-01/02); flags self-transfer and closed recipients (AC-04/05); a
      cross-currency recipient gates submit until the converted amount is acknowledged (AC-06).
    - .../new-payment/new-payment-form.ts (messageForPaymentError) — exact design copy per reason, folding in
      the server-echoed available balance ("Available: $3,000.00.") and daily limit; daily_limit_exceeded
      surfaces the "Request limit increase" CTA (AC-01/02); recipient_not_found highlights the field (AC-03).
    - .../new-payment/CrossCurrencyPanel.tsx + libs/data-access/payments/src/use-exchange-rate.ts — live rate
      lookup showing the converted amount and rate, with an explicit acknowledge-before-send step; a failed/
      stale lookup blocks send with a retry prompt (AC-06).
    - libs/mock-backend/src/services/payments.service.ts — server re-runs validatePayment and resolveRecipient,
      distinguishing recipient_not_found from recipient_closed from self_transfer as distinct 422 reasons
      (AC-03/04/05); getExchangeRate backs the FX panel (AC-06).
    - Tests: payment-validation-policy, use-exchange-rate, new-payment-form, PaymentFormAlerts, NewPaymentPage,
      payments.service (balance/limit/recipient/self/fx) — all green.
