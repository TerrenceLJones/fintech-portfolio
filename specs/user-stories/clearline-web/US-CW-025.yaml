# User Story
user_story:
  persona: 'clearline-web engineer building any feature epic'
  capability: 'the 4 Tier-3 organisms (DataTable, ApprovalActionBar, BulkActionResult, EmptyState) plus the 3 scaffolding decorators (AppShell)'
  business_value: 'the highest-effort, highest-payoff assemblies — a selectable/sortable data table, an approval bar that correctly disables itself with a stated reason, a partial-failure summary that never rolls back the successes — are built once, and a whole screen can be assembled with zero per-page token/theme boilerplate via AppShell'
  description: |
    As a clearline-web engineer
    I want DataTable/ApprovalActionBar/BulkActionResult/EmptyState and the AppShell decorators available as typed React components
    So that I can assemble a full screen (selection, sorting, approval flows, partial-failure summaries) by composing already-built pieces instead of writing table selection/sort logic or approval-limit disabling logic from scratch in each feature epic

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given DataTable with multiple rows
      When I click the header checkbox
      Then all rows toggle selected/deselected together, and a selection action bar appears showing the count and Approve/Export actions
    status: 'active'
  - id: 'AC-02'
    description: |
      Given DataTable
      When I click the "Vendor" column header
      Then the rows re-sort by vendor name, toggling ascending/descending on repeated clicks
    status: 'active'
  - id: 'AC-03'
    description: |
      Given ApprovalActionBar with a `reason` prop set (e.g. separation-of-duties) and no explicit `canApprove`
      When it renders
      Then Approve is disabled and the reason is shown in text beneath the buttons — never silently missing
    status: 'removed'
    removed_date: '2026-07-10'
    removal_reason: |
      The ApprovalActionBar organism was deleted after its only consumer (the approvals queue)
      was redesigned to render approval actions inline within a DataTable to match the approved
      designs (US-CW-006). The "disabled Approve with a stated reason" behavior this AC guaranteed
      is now satisfied inline on ApprovalsPage rather than by a standalone organism.
  - id: 'AC-04'
    description: |
      Given BulkActionResult with `total=10` and 2 `failures`
      When it renders
      Then it shows "8 of 10 approved" (the committed count excludes the failures) with each failure's specific reason listed, plus a "Retry failed (2)" action
    status: 'active'
  - id: 'AC-05'
    description: |
      Given `<AppShell>` wrapping any page content, with a `<ThemeProvider>` mounted once at the app root
      When rendered
      Then it renders the persistent left sidebar rail (brand · role-scoped vertical navigation · footer with the Light/Dark toggle, relocated from the old top bar into the rail) backed by that shared theme state, beside a scrollable content column, and requires zero additional per-page token setup
    status: 'active'
    # AC-05 layout contract rewritten from a sticky top bar to the sidebar rail by EPIC-CW-021 (2026-07-17); theme-state guarantees unchanged.

# Technical Notes
technical_notes: |
  DataTable composes Checkbox (Tier 1) and StatusBadge (foundations) rather than reimplementing
  either. AppShell consumes theme state via `useTheme()` (from @clearline/design-tokens)
  rather than instantiating its own `<ThemeProvider>` — the app root mounts ThemeProvider once, so
  theme state is shared app-wide and other theme-dependent chrome (e.g. US-CW-028's NavigationShell)
  can compose alongside AppShell without going through it. A consuming screen still only ever writes
  `<AppShell title="...">...</AppShell>`, matching the "zero per-page boilerplate" pattern demonstrated
  by the `Clearline - 09 Spend Dashboard (Migrated).dc.html` reference.

# Edge Cases
edge_cases: |
  - DataTable's "select all" checkbox shows an indeterminate state when some (not all) rows are selected
  - ApprovalActionBar's Escalate action can be hidden independently of the approve/reject disabling
  - BulkActionResult with zero failures still renders correctly (no failure rows, no crash)
  - AppShell's theme toggle affects the whole subtree via `data-theme` on `document.documentElement`,
    verified by asserting on `document.documentElement.getAttribute('data-theme')` in tests, not
    just component-local state
  - AppShell renders nothing meaningful without a `<ThemeProvider>` ancestor (useTheme throws) —
    call sites (and its own tests/stories) must supply one rather than relying on AppShell to create it

