# User Story
user_story:
  persona: 'assistive-technology user (e.g., screen reader or keyboard-only operator) managing company spend'
  capability: "perceive, navigate, and operate every part of Clearline's spend management UI without relying on color, a mouse, or sighted interaction alone"
  business_value: 'I can independently and confidently review financial status, submit payments, and correct errors, meeting WCAG 2.1 AA so the product is usable and legally compliant for all operators regardless of ability'
  description: |
    As an assistive-technology user (e.g., screen reader or keyboard-only operator) managing company spend
    I want to perceive, navigate, and operate every part of Clearline's spend management UI without relying on color, a mouse, or sighted interaction alone
    So that I can independently and confidently review financial status, submit payments, and correct errors, meeting WCAG 2.1 AA so the product is usable and legally compliant for all operators regardless of ability

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given any UI element conveys a positive, negative, warning, or critical state
      When it is rendered
      Then it includes an icon and explicit text label in addition to color
      And this holds true across PercentageChange, RiskIndicator, TransactionStatusBadge, and budget gauges
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I am navigating using only a keyboard
      When I tab through the "New Payment" form
      Then focus moves in a logical order through all interactive elements
      And each focused element has a visible focus ring of at least 3px
      And I can submit the form entirely via keyboard, including the confirmation dialog
    status: 'active'
  - id: 'AC-03'
    description: |
      Given a screen reader user views a MoneyDisplay component showing $1,999.00
      When the value is read aloud
      Then the aria-label provides the full spoken amount, e.g., "One thousand nine hundred ninety-nine dollars"
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I submit a form with a validation error
      When the error appears
      Then it is associated with its field via aria-describedby
      And it is announced to screen readers via a role="status" or role="alert" live region
      And the erroring field is identified in text, not by color or position alone
    status: 'active'
  - id: 'AC-05'
    description: |
      Given a "You're about to send $5,000.00 to Acme Corp" confirmation dialog is open
      When it is displayed
      Then focus is trapped within the dialog until it is dismissed or confirmed
      And a countdown timer (if present) is announced to screen readers
      And pressing Escape cancels the action without submitting
    status: 'active'

# Technical Notes
technical_notes: |
  All status, risk, and budget indicator components (PercentageChange, RiskIndicator, TransactionStatusBadge, budget gauges)
  must pair color with an icon and explicit text label, never conveying state via color alone. Interactive forms (e.g., "New
  Payment") require a logical tab order and a visible focus indicator of at least 3px on every focusable element, with full
  keyboard operability including modal confirmation dialogs. MoneyDisplay components must expose a fully spoken aria-label
  (e.g., "$1,999.00" -> "One thousand nine hundred ninety-nine dollars") rather than relying on the raw numeric/symbol text.
  Form validation errors must be programmatically associated with their field via aria-describedby and announced through a
  role="status" or role="alert" live region, with the erroring field identified in text. Confirmation dialogs for irreversible
  actions must implement a focus trap, announce any countdown timer to assistive technology, and support Escape-to-cancel
  without submitting.

# Edge Cases
edge_cases: |
  - Status/risk/budget indicators rendered with color only and no icon or text label (must be rejected).
  - Keyboard user tabbing through "New Payment" form encounters illogical focus order or a missing/sub-3px focus ring.
  - Keyboard user reaches the confirmation dialog and cannot complete submission without a mouse.
  - Screen reader encounters a MoneyDisplay value with no aria-label or a literal/unspoken numeric readout.
  - Form validation error rendered without aria-describedby association to its field.
  - Form validation error not announced via role="status" or role="alert" live region.
  - Erroring field identified only by color or visual position, with no text identification.
  - Confirmation dialog for an irreversible action (e.g., sending $5,000.00) allows focus to escape the dialog while open.
  - Countdown timer present in a confirmation dialog but not announced to screen readers.
  - Escape key press on a confirmation dialog submits the action instead of canceling it.
  - Mobile touch-target sizing requirement (Clearline Mobile) is out of scope for clearline-web and intentionally excluded from this story.
  - (inferred) High-contrast or browser-level forced-colors mode strips custom focus ring styling, leaving no visible focus indicator.

# Implementation Status
implementation_status: |
  Implemented under EPIC-CW-014 (2026-07-17). AC-01 non-color indicators — StatusBadge, BudgetGauge, and
  MoneyDisplay (credit/debit) already pair color with an icon and text; SimilarityPill (fuzzy-match risk cue) now
  carries a sparkles icon alongside its spelled-out score. AC-02 keyboard focus — a global :focus-visible baseline
  in @clearline/ui styles.css gives every focusable element a >=3px ring with a forced-colors fallback, and the
  standalone Demo Beacon carries its own >=3px ring on its launcher, switch, close, and action buttons. AC-03 spoken
  money — spokenMoneyAmount/spokenMoney in @clearline/money turn an amount into a fully spoken phrase ("One thousand
  nine hundred ninety-nine dollars"), exposed by MoneyDisplay as visually-hidden text while the glyphs are aria-hidden,
  with credit/debit direction spoken too. AC-04 form errors — TextField associates its error via aria-describedby +
  role="alert"; the New Payment form ties the erroring field (amount / manual recipient) to its live-region message via
  a shared aria-describedby id. AC-05 confirmation dialogs — ConfirmationDialog (Radix Modal) traps focus, cancels on
  Escape, gates the confirm button through a countdown, and now announces via a polite live region when the action
  becomes confirmable. A prefers-reduced-motion guard stills the loading-skeleton shimmer.
