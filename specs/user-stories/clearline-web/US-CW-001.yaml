# User Story
user_story:
  persona: 'registered Clearline user'
  capability: 'securely log in with my email and password and receive clear, non-revealing feedback when authentication fails'
  business_value: "I can reliably and safely access my company's spend dashboard while the platform protects my account and the system as a whole from credential-guessing and brute-force attacks"
  description: |
    As a registered Clearline user
    I want to log in with my email and password and receive clear feedback on success or failure, including protection against repeated failed attempts and resilience during outages
    So that I can safely and reliably reach my spend dashboard without my login attempts exposing whether an account exists or weakening the platform's security posture

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I am a registered Clearline user with a verified account
      And I am on the login page
      When I enter my correct email and password
      And I submit the login form
      Then I am redirected to the spend dashboard
      And an access token is stored in memory only
      And a refresh token is stored in an httpOnly, Secure, SameSite=Strict cookie
      And an audit event is recorded with my user ID, timestamp, and IP address
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I am on the login page
      When I enter a registered email and an incorrect password
      And I submit the login form
      Then I see an inline error "Incorrect email or password"
      And the password field is cleared
      And no audit event reveals whether the email exists in the system
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I am on the login page
      When I enter an email that is not registered
      And I submit the login form
      Then I see the same inline error "Incorrect email or password"
      And the system does not reveal that the email is unregistered
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I have failed to log in 5 times within 15 minutes
      When I attempt to log in again with any credentials
      Then I see "Your account is temporarily locked for your protection. Contact support to restore access."
      And a support reference ID is displayed
      And an audit event records the lockout
    status: 'active'
  - id: 'AC-05'
    description: |
      Given I am on the login page
      And the authentication service is unreachable
      When I submit valid credentials
      Then I see "Something went wrong on our end. Retrying…"
      And the client retries the request up to 3 times with exponential backoff
      And after 3 failed retries I see a manual "Try again" button
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I am on the login page
      Then I see a "Don't have an account? Sign up" link
      When I click it
      Then I am navigated to the sign-up page (US-CW-029)
    status: 'active'
  - id: 'AC-07'
    description: |
      Given I am a registered Clearline user whose account is not yet verified
      When I enter my correct email and password
      And I submit the login form
      Then I am not redirected to the spend dashboard, and no access or refresh token is issued
      And I see "Verify your email to continue. Check your inbox for the link, or request a new one."
      with a "Resend verification email" action
      And an audit event distinct from login_success records the blocked attempt
    status: 'active'

# Technical Notes
technical_notes: |
  Access tokens must be held in memory only (never localStorage/sessionStorage) to limit XSS exfiltration risk, while
  refresh tokens are issued as httpOnly, Secure, SameSite=Strict cookies to prevent client-side script access and
  cross-site leakage. Authentication failures must be indistinguishable between "wrong password" and "unregistered
  email" at both the UI and audit-log layer to prevent user enumeration. Account lockout requires a server-side
  counter of failed attempts scoped to a 5-attempts-in-15-minutes rolling window, with a generated support reference
  ID surfaced to the user for lockout recovery. The login client must implement retry with exponential backoff
  (max 3 attempts) for transient authentication-service unavailability, falling back to a manual retry affordance.

  "Contact support" is decorative copy, not a functional link, in both the AC-04 lockout message and the login
  screen's footer ("Trouble signing in? Contact support"). No story anywhere in the registry (this one, US-CW-005,
  or US-CW-014, which all use the same "Contact support" phrasing) defines an actual destination — no mailto,
  chat widget, or support-ticket page. Per TDR-CW-WEB-001's "frontend demo, not a real financial system" framing,
  treat this as intentionally out of scope rather than a gap deferred to a specific future epic, so it isn't
  mistaken for a bug later. "Forgot password?" is the one login-screen link that IS a real, tracked gap — it maps
  to US-CW-003 (Password Reset).

  AC-06 ("Don't have an account? Sign up") was added by EPIC-CW-016 once US-CW-029 introduced an actual sign-up
  destination for it to point to — the login screen had no such link before then, unlike "Forgot password?",
  which predates a working destination and remains decorative until US-CW-003 is built.

  AC-07 was added by EPIC-CW-016 (as an amendment on 2026-07-03, alongside its original AC-06 addition on
  2026-07-02 — see that epic's notes) to close a gap this story always implied but never enforced: AC-01's own
  precondition ("a registered Clearline user with a verified account") only holds if login() actually checks
  verified status, which it did not until this AC. The check must run after password verification succeeds —
  it does not reopen AC-02/AC-03's enumeration guarantee, since it's only reachable once the correct password
  has already been supplied, unlike the wrong-password/unregistered-email branches those ACs protect. A
  correct-password-but-unverified attempt clears failed-attempt history exactly like a real success (the
  credentials were valid; only verification status blocked the login) and is logged as its own audit event
  type, distinct from login_success, so audit trails can distinguish "logged in" from "proved the password but
  was turned away." The "Resend verification email" affordance this AC surfaces reuses AuthService.signUp's
  existing resend branch for an already-registered-but-unverified email (see US-CW-029's technical_notes) —
  no new token-issuing logic was added for it.

  Password confidentiality is two separate concerns, handled by two separate mechanisms, never conflated. In
  transit: TLS/HTTPS is the only recognized mechanism (NIST SP 800-63B requires "an authenticated protected
  channel using approved cryptography" for authenticator secrets) — Vercel enforces this at the platform level;
  no per-request application-layer encryption is added on top, and none should be. At rest: passwords are hashed,
  never encrypted — hashing is one-way by design, so nothing (including the backend itself) can ever recover the
  plaintext. This is implemented via PBKDF2-HMAC-SHA256 (@fintech-portfolio/domain-auth's password-hashing
  module), OWASP's documented fallback where Argon2id isn't available — Argon2id has no native Web Crypto support
  and would require a WASM dependency inside the browser-mode MSW service worker this mock backend runs in.
  AuthService.login also runs a dummy-hash verification for unregistered emails so response timing can't be used
  to enumerate which emails are registered, matching this story's existing enumeration-safety intent (AC-02/AC-03).
  Sources: OWASP Password Storage Cheat Sheet, NIST SP 800-63B §5.1.1 (Authenticators).

  Failed-attempt lockout tracking must be keyed by the attempted email regardless of whether it corresponds to a
  registered account. Scoping tracking to real accounts only would reopen an enumeration side-channel via lockout
  timing — unregistered emails would never lock while registered ones lock after 5 attempts — even with the
  identical invalid_credentials error message from AC-03 in place. This is intentional and should not be
  "optimized" to skip tracking unregistered emails.

# Edge Cases
edge_cases: |
  - Incorrect password on a valid, registered email
  - Login attempt against an unregistered email address
  - Account lockout after 5 failed attempts within a 15-minute window
  - Authentication service unreachable during login submission (network outage)
  - Exhausting all 3 automatic retries without success, requiring manual "Try again" action
  - Login submitted with an unverified account, blocked with a "Resend verification email" action (AC-07)

