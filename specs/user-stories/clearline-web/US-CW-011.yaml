# User Story
user_story:
  persona: 'Employee'
  capability: 'submit an expense for reimbursement with the required category, amount, and receipt details, and receive real-time feedback when company spending policy is violated'
  business_value: 'expenses are routed correctly for approval and policy compliance is enforced at the point of entry, reducing rework and approval delays'
  description: |
    As an Employee
    I want to submit an expense with a category, amount, and receipt, and see real-time policy feedback as I fill out the form
    So that my expense is correctly routed for approval and I can correct policy violations before submission instead of after rejection

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I am logged in as an Employee
      When I submit an expense of $300.00 with a receipt attached and a category selected
      Then the expense enters "Pending approval" status
      And it is routed to my designated approver based on amount and policy
      And I receive a confirmation "Expense submitted for approval"
    status: 'active'
  - id: 'AC-02'
    description: |
      Given company policy requires a receipt for expenses over $75.00
      When I submit an expense of $120.00 without a receipt
      Then I see an inline error "A receipt is required for expenses over $75.00."
      And submission is blocked until a receipt is attached
    status: 'active'
  - id: 'AC-03'
    description: |
      Given a category has a per-transaction policy limit of $200.00
      When I enter an amount of $350.00 in that category
      Then I see an inline warning "This exceeds the $200.00 policy limit for this category" before I submit
      And I may still submit, but the expense is flagged for additional scrutiny in the approval queue
    status: 'active'

# Technical Notes
technical_notes: |
  Receipt-required and per-transaction policy-limit thresholds must be evaluated client-side in real time
  (on field change, prior to submission) and re-validated server-side at submission time to prevent bypass.
  Routing logic must resolve the designated approver based on both expense amount and applicable policy
  rules at submission time. Submission must be blocked synchronously when a required receipt is missing,
  while policy-limit violations are advisory only and must not block submission, instead setting a flag
  that the approval queue can surface for additional scrutiny.

# Edge Cases
edge_cases: |
  - Expense amount exactly at the $75.00 receipt-required threshold (inferred)
  - Expense amount exactly at the $200.00 per-transaction policy limit (inferred)
  - Submission attempted without a receipt above the $75.00 threshold — submission blocked until receipt attached
  - Amount entered exceeds category policy limit — inline warning shown but submission still permitted with scrutiny flag
  - No category selected at submission time (inferred)

# Implementation Status
implementation_status: |
  ✅ Implemented 2026-07-15 (EPIC-CW-006). Employees submit expenses via NewExpensePage
  (apps/clearline-web/src/pages/expenses/) with category, amount, and receipt; the pure policy gate in
  @clearline/domain (use-new-expense-form) enforces the receipt-required and per-category policy-limit
  rules with real-time feedback before submit, and over-limit items submit flagged for scrutiny. The
  mock backend enqueues the submission into the approval queue (ApprovalsService.enqueue).
