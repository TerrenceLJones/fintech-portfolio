# User Story
user_story:
  persona: 'business owner setting up a new Clearline account'
  capability: 'complete a guided, save-and-resume multi-step onboarding flow that captures business information and beneficial ownership data, verifies the entity, and culminates in account approval'
  business_value: 'I can stand up my Clearline account efficiently and confidently, picking up where I left off if interrupted, and gain full transacting capability as soon as verification clears'
  description: |
    As a business owner setting up a new Clearline account
    I want a guided, save-and-resume onboarding wizard that collects business info and beneficial owner details and verifies them
    So that I can efficiently complete KYB requirements and unlock full transacting capability without losing progress or encountering confusing errors

# Acceptance Criteria
acceptance_criteria:
  - id: 'AC-01'
    description: |
      Given I have created a Clearline account
      When I start the onboarding flow
      Then I see a multi-step wizard: Business Info → Beneficial Owners → Document Upload → Review
      And my progress is saved after each step (save-and-resume)
    status: 'active'
  - id: 'AC-02'
    description: |
      Given I completed the "Business Info" step previously
      And I closed the browser before completing later steps
      When I return to Clearline and log in
      Then I am taken directly to the "Beneficial Owners" step
      And my previously entered Business Info is pre-filled and unchanged
    status: 'active'
  - id: 'AC-03'
    description: |
      Given I am on the Business Info step
      When I enter a valid legal business name, EIN, and registered address
      And I submit the step
      Then the entity is verified against business registries
      And I am advanced to the Beneficial Owners step
    status: 'active'
  - id: 'AC-04'
    description: |
      Given I am on the Business Info step
      When I enter an EIN that does not match any registered business
      And I submit the step
      Then I see an inline error "We couldn't verify this EIN. Please check and try again."
      And the field is highlighted for correction
    status: 'active'
  - id: 'AC-05'
    description: |
      Given I am on the Beneficial Owners step
      When I add an owner with 25% or greater ownership
      Then that owner is flagged as requiring individual identity verification (KYC)
      And I must provide their first name, last name, date of birth, and SSN/ITIN
    status: 'active'
  - id: 'AC-06'
    description: |
      Given I have been inactive on an onboarding step for over 30 minutes
      When I return to the page
      Then I see "Your verification session timed out. Let's start again from where you left off."
      And I resume from my last successfully completed step, not from the very beginning
    status: 'active'
  - id: 'AC-07'
    description: |
      Given a business with the same EIN already has a Clearline account
      When I attempt to onboard that same business
      Then I see "It looks like your business already has an account. Sign in instead."
      And a "Sign in" call to action is shown
    status: 'active'
  - id: 'AC-08'
    description: |
      Given all verification steps pass
      When the review is completed
      Then I receive an email and in-app notification "Your account is approved"
      And full transacting capability (payments, card issuance) is unlocked
    status: 'active'
  - id: 'AC-09'
    description: |
      Given I have created a Clearline account and have not yet completed onboarding
      When I navigate directly to the dashboard or any other main application page
      Then I am redirected to my current step in the KYB onboarding wizard
      And I cannot reach the dashboard until onboarding is complete
    status: 'active'
  - id: 'AC-10'
    description: |
      Given my onboarding is complete and my account is approved
      When I navigate directly to any KYB wizard step URL (e.g. /onboarding/business)
      Then I am redirected to the dashboard
      And I am not shown the onboarding wizard again
    status: 'active'
  - id: 'AC-11'
    description: |
      Given I have submitted my application and it is under review
      When I navigate directly to a KYB wizard step URL
      Then I am redirected to the onboarding status page, not an editable wizard step
      And I can still reach non-financial areas of the product, including the dashboard,
      while my review is pending (see US-CW-005 AC-05)
    status: 'active'
  - id: 'AC-12'
    description: |
      Given I have not yet submitted my application
      When I navigate directly to the onboarding status page
      Then I am redirected to my current step in the KYB onboarding wizard
      And I am not shown an empty or terminal status screen
    status: 'active'

# Technical Notes
technical_notes: |
  Onboarding state must persist server-side after every step completion to support save-and-resume across
  sessions and devices, with resumption always routing to the last successfully completed step. Business Info
  submission requires a synchronous integration with a business registry / EIN verification service, and
  beneficial owner records with ownership >= 25% must trigger a downstream individual KYC verification workflow
  capturing first name, last name, date of birth, and SSN/ITIN. Beneficial owner names are captured as discrete
  first-name and last-name fields (not a single free-text full-name input) for every owner, with a full name
  derived from the two parts wherever a combined display value is needed. Session activity must be tracked with
  a 30-minute inactivity
  timeout that invalidates the in-progress step without discarding previously saved steps. EIN uniqueness must
  be enforced at submission time to detect duplicate business accounts before a new onboarding record is created.

  Onboarding-completion routing (AC-09..AC-12) is gated entirely off the server-authoritative onboarding
  status — never client-side flags — so it stays correct across devices and reloads exactly like save-and-resume.
  A single pure resolver maps a status to where that user belongs (in_progress -> wizard, under_review /
  documents_blocked -> status page, approved -> app), and three route guards read it: (1) the dashboard/app routes
  gain an onboarding guard that redirects anyone who has not completed onboarding to their current wizard step
  (AC-09) — the same guard is what makes a not-yet-onboarded user who lands on "/" after login end up in the
  wizard rather than a half-usable dashboard; (2) the existing wizard-step guard redirects an approved user to the
  dashboard instead of the status page (AC-10) and still routes under_review / documents_blocked to the status page
  (AC-11); (3) the status page redirects an in_progress user to their current wizard step instead of rendering an
  empty screen (AC-12). Dashboard access is deliberately permitted for both approved AND under_review so a pending
  compliance review never blocks non-financial areas of the product (US-CW-005 AC-05); only in_progress (not yet
  submitted) and documents_blocked (hard stop, contact support) are kept out of the app. All redirects use replace
  navigation so the browser back button cannot re-enter a route the user was just redirected out of.

  Form library decision deferred to this story: clearline-web's login screen (US-CW-001) hand-rolled its form
  state with plain useState, which was fine for a 2-field form with no client-side validation beyond HTML5
  `required` (all real validation there is server-driven — invalid credentials, lockout, network errors). This
  multi-step, save-and-resume wizard with real field-level validation (EIN format, SSN/ITIN, ownership
  percentages, per-step error states) is a materially different shape and is where a form library likely
  pays for itself — evaluate react-hook-form (+ zod, already a project dependency per TDR-CW-WEB-001's
  ai_integration structured-outputs decision) before hand-rolling this wizard's state.

# Edge Cases
edge_cases: |
  - EIN entered does not match any registered business (failed registry verification)
  - Session inactive for over 30 minutes during onboarding, requiring resumption from last completed step
  - Duplicate business account detected via matching EIN
  - Browser closed mid-flow before later steps are completed, requiring resume logic on next login
  - Beneficial owner added at or above the 25% ownership threshold requiring additional KYC data collection
  - (inferred) Network or registry-service outage during Business Info submission preventing entity verification
  - (inferred) Concurrent onboarding attempts for the same EIN from two different sessions
  - Not-yet-onboarded user lands on or deep-links to the dashboard (e.g. immediately after login) and must be
    routed into the wizard at their current step (AC-09)
  - Approved user returns to a bookmarked or back-button wizard step URL and must be routed to the dashboard (AC-10)
  - Under-review or documents-blocked user opens a wizard step URL and must be routed to the status page, not an
    editable step (AC-11)
  - In-progress user deep-links to the onboarding status page before submitting and must be routed back into the
    wizard rather than shown a blank terminal screen (AC-12)

