notes: >
  Ports the already-complete, already-validated Clearline design system (a Claude Design
  export: clearline-tokens.json, clearline-icons.json, DESIGN-SYSTEM.md, COMPONENT-AUDIT.md,
  and one .dc.html spec per component) into a typed, tested React component library living in
  libs/, ahead of and independent from apps/clearline-web itself (still a placeholder pending
  TDR-CW-WEB-001 execution). Unblocks all 15 feature epics (EPIC-CW-001 through EPIC-CW-015),
  each of which now points its `ui_library` field at `@fintech-portfolio/ui`.

  Amends TDR-PLATFORM-001's `shared_design_system_tooling` decision, which deferred a shared
  component-primitives library "until a second app exists to validate real reuse." That
  rationale no longer holds now that a fully-specified, already-validated design system exists
  as a finished artifact — populating the empty `libs/design-tokens` stub and adding
  `libs/icons`/`libs/ui` costs little relative to unblocking 15 pending epics. Scope stays
  intentionally Clearline-branded, not a generic cross-portfolio kit, consistent with the TDR's
  own "revisit once a second app exists" framing.

  Follow-up (US-CW-027): added a shared `Money` type (libs/contracts, shape only), a
  `toMajorUnits` conversion (new libs/util/money — domain logic, not API shape, so it doesn't
  belong in contracts), and a currency-aware `formatMoney` (libs/ui, display only) once a
  currency-precision bug was spotted in US-CW-019's technical_notes — it assumed "two decimal
  places" universally, which is wrong for 0-decimal currencies (JPY) and 3-decimal currencies
  (BHD). US-CW-019 has been corrected to reference the shared utility instead. `libs/util/money`
  is the first nested lib in this repo, matching the standalone Clearline plan's `libs/util/*`
  grouping ahead of `libs/domain/*`/`libs/data-access/*`/`libs/feature/*` being introduced later.
