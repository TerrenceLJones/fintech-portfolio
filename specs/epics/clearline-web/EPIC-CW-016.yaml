notes: >
  Establishes the account-creation step that precedes both login (US-CW-001) and business onboarding
  (US-CW-004): a business owner signs up with a work email and password, receives an enumeration-safe
  response regardless of whether that email is already registered, and verifies their email before
  being routed into KYB onboarding. Deliberately kept as its own epic rather than folded into the
  already-APPROVED EPIC-CW-001, whose adds list reflects a completed scoping pass this gap was found
  after. US-CW-004's dependencies field is not modified by this epic — see US-CW-029's technical_notes
  for that cross-reference instead, so this epic's blast radius stays limited to the one new story it
  adds.

  Reciprocal navigation links tie the two flows together: US-CW-001 gains AC-06 ("Don't have an
  account? Sign up") and US-CW-029 gains AC-06 ("Already have an account? Log in"), each pointing at
  the other's page now that both destinations exist.
