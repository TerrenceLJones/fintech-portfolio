  confirmation (AC-06). /settings/org-notifications is an immediate-save budget-alert recipient list (AC-07)
  + approval-queue reminder-frequency selector (AC-08). Introduced @clearline/domain-integrations,
  @clearline/data-access-integrations and @clearline/data-access-org-notifications, integrations/
  org-notifications contracts + the `accounting_integration`/`org_notification` AuditCategory members,
  IntegrationsService + OrgNotificationsService (shared singletons, fixtures, handlers), and two demo-beacon
