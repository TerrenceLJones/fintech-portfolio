notes: >
  The complete /settings surface for Clearline Web, structured as one shell story plus one story per settings
  section, mirroring the SettingsNav two-tier information architecture in design §19.1:

    Profile group (every authenticated user):
      US-CW-033 shell + nav · US-CW-034 Personal Info + Notifications · US-CW-035 Security ·
      US-CW-048 User Logout (the "Log out" action in the identity-footer user menu)
    Organization group (Controller / Admin / Owner — never Employees):
      US-CW-036 Company Profile · US-CW-031 Team & Members (EXISTING, EPIC-CW-017 — relocated into Settings at
      /settings/team) · US-CW-037 Approval Policies & Spend Controls · US-CW-038 Card Program & Connected
      Accounts · US-CW-039 Integrations & Org Notifications · US-CW-040 Security & Compliance (with US-CW-043
      Ownership Transfer mounted inside it, Owner-only) · US-CW-041 Developer · US-CW-042 Billing & Plan

  Cross-cutting design requirements (design §19 intro — these are requirements, not preferences, and every
  story restates the ones it touches):
    - Secrets are shown exactly once: API keys and webhook signing secrets use a reveal-once modal and are
      never re-displayable (US-CW-041); TOTP backup codes are shown exactly once (US-CW-035).
    - Client hides, server decides: the Organization group is NOT RENDERED for Employees (never shown disabled
      or locked), and every org-settings route + API independently returns 403 regardless of client routing
      (US-CW-033 AC + each org story).
    - Destructive actions name the specific thing they destroy — never a bare "Are you sure?" (design §19.9);
      revoking a key, disconnecting an integration, removing a bank account, cancelling a subscription each
      spell out the consequence.
    - No derived value is ever rendered as editable; no state is conveyed by color alone (sync status, usage
      "approaching limit", webhook delivery status all carry icon + text).
    - Client-side-only crypto where a secret must not leak: the TOTP QR is a client-rendered SVG so the secret
      never reaches a third-party image service (US-CW-035); the webhook HMAC verification example is a
      reference snippet (US-CW-041).
    - An unsaved-changes footer bar governs every form-bearing settings page (US-CW-034 establishes it; other
      form pages reuse it).

  Sequencing: US-CW-033 (shell + SettingsNav + routing + role gating) is the foundation every other story
  mounts into and should land first. US-CW-034 establishes the shared unsaved-changes footer + avatar/crop +
  reveal-once/verification-link conventions the later stories reuse. The Organization-group stories
  (US-CW-036…042) each depend on the shell and on the RBAC permission additions declared in the US-CW-006
  update; they are otherwise independent of one another and can be picked up in any order. US-CW-043 (Ownership
  Transfer) is the exception — it mounts inside US-CW-040 (Security & Compliance) and reuses the US-CW-035
  step-up re-auth, so it depends on both and should follow them; it is Owner-gated (isOwner), not gated by the
  org-settings permission set, and extends EPIC-CW-017's team domain.

  Explicitly OUT OF SCOPE: Team & Members *management* logic — invite, role assignment, removal (owned by
  EPIC-CW-017 / US-CW-031). This epic RELOCATES that surface into Settings: it wires Team & Members into
  SettingsNav and mounts the existing TeamPage unchanged at /settings/team (guarded by team:view), and removes
  the old top-level /team route and its primary-sidebar item (no redirect) — without re-implementing team
  management. Ownership Transfer (US-CW-043) is the one membership-adjacent capability this
  epic DOES own, because its surface is Settings → Security & Compliance and EPIC-CW-017 explicitly deferred it
  to a future epic; it extends EPIC-CW-017's team domain rather than duplicating it. Real KYB re-verification,
  real SSO/SAML brokering, real Plaid/Stripe/
  QuickBooks backends, and real TOTP validation are mocked via the MSW service layer per the project's
  Mock Backend Architecture — these are frontend responsibilities within that system, not a production
  financial/identity stack.

