notes: >
  A single, tightly-scoped gap-closure: the pending-invite Resend and Revoke controls from design §18.1,
  the only part of §18 that EPIC-CW-017 left as display-only (the roster showed a Pending row but no
  working actions). Everything else in the original §18 team-management surface — the invite lifecycle,
  role change, member removal, the Organization entity, the RequireOnboarded invited-member bypass, the
  non-owner duplicate-EIN branch, and the US-CW-004 / US-CW-006 amendments — was delivered by EPIC-CW-017
  and is NOT part of this epic; this epic's changes.updates deliberately claims none of it.

  Design-confirmed behavior: "Resend issues a fresh link and invalidates the old one" (§18, mirrored from
  the password-reset / verification resend copy). Resend keeps the same PendingInvite id so the roster row
  stays put, mints a new hashed token, and restarts the 7-day expiry from the resend time; the old link
  reports invalid thereafter. Revoke removes the outstanding invite entirely — getInviteDetails and
  acceptInvite both report it invalid — and drops it from the roster. Both emit a role_change audit event
  (§18.4). The raw token is never returned over the network for either, consistent with the
  enumeration-safe create path.

  Implemented 2026-07-18: AuthService.resendInvite (async, mints + swaps the token) and
  AuthService.revokeInvite (deletes), both org-scoped via findInviteInOrg and returning invite_not_found
  for an unknown/foreign id; PersistedAuthService overrides both to snapshot (no SNAPSHOT_VERSION bump —
  the invitesByTokenHash shape is unchanged). Endpoints POST /api/team/invites/:id/resend (200,
  enumeration-safe empty body) and DELETE /api/team/invites/:id (204) reuse authorizeAdmin (AC-07) and
  emit "Resent invite" / "Revoked invite" role_change audit events. data-access-team gains
  useResendInvite / useRevokeInvite (roster-invalidating, mirroring useRemoveMember). TeamPage's pending
  row now renders a Resend button and a Revoke (×) action behind a ConfirmationDialog; the Team beacon
  gains a "Resend or revoke a pending invite" flow. US-CW-031 keeps its provenance history and gains
  AC-09 / AC-10.
