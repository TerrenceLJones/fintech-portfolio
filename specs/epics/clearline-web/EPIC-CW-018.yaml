changes:
  adds:
    - story_id: 'US-CW-031'
      story_path: '/specs/user-stories/clearline-web/US-CW-031.yaml'
      title: 'Team Member Invitations & Management'
  updates:
    - story_id: 'US-CW-004'
      story_path: '/specs/user-stories/clearline-web/US-CW-004.yaml'
      title: 'Business Onboarding Flow'
      reason: >
        Two additions, applied at this epic's implementation time. (1) RequireOnboarded must admit invited
        members — who have no per-user onboarding record — to the app instead of redirecting them into the KYB
        wizard, by inheriting their Organization's approved status (US-CW-031 AC-10). (2) A new acceptance
        criterion for the NON-owner duplicate-EIN branch: AC-07 today only covers the creator re-onboarding
        ("Sign in instead"); the design also specifies a different person hitting an already-claimed EIN being
        told "your business already has an account — ask your admin to invite you," with no sign-in CTA and no
        credentials (US-CW-031 AC-11). That branch is currently design-only with no matching AC on US-CW-004.
    - story_id: 'US-CW-006'
      story_path: '/specs/user-stories/clearline-web/US-CW-006.yaml'
      title: 'Role-Based Navigation & Approval Authority'
      reason: >
        Extends the `team:view` permission — today granted only by isAdmin — to also be granted by isOwner
        (introduced in EPIC-CW-019), so team-management nav and endpoints authorize on isOwner OR isAdmin. This
        is deferred to here rather than done in EPIC-CW-019 because there is no team surface to gate until this
        epic ships; granting team:view earlier would render a nav item pointing at a nonexistent page. The
        mid-session role-change handling (AC-05) and "Your access changed" banner are reused as-is by
        US-CW-031's role-change flow.
  deprecates: []
  removes: []
notes: >
  The deferred invite / team-management half of design §18 ("One Owner, invite-only membership"). Contains a
  single story, US-CW-031: the invite and team-management lifecycle — invite by email + approval-tier role with
  optional Admin, single-use 7-day enumeration-safe link, self-set-password acceptance (no temporary
  passwords), pending / resend / revoke, role change, member removal, non-admin 403 enforcement, and audit.
  This epic also introduces the distinct Organization entity (members belong to it, invites target it), and
  it owns the two behaviors that only make sense once non-creator members exist: invited members bypassing KYB
  onboarding (US-CW-031 AC-10, via the RequireOnboarded change) and the non-owner duplicate-EIN "ask your admin
  to invite you" branch (US-CW-031 AC-11).

  Sequencing: the owner-provisioning foundation is EPIC-CW-019 (US-CW-030 — isOwner flag + creator elevated to
  Controller + Owner at KYB approval), which is implemented first and answers the RBAC/KYB interaction on its
  own. This epic is picked up later and builds the team surface on top of that foundation; hence depends_on
  EPIC-CW-019.

  Credential model (design-confirmed, project-owner-approved 2026-07-07): invited users SET THEIR OWN password
  via the invite link — there is no temporary-password mechanism anywhere in the product. Matches the §18.3
  "Set a password to join" mockup and the enumeration-safe, single-use-token conventions already shipped for
  sign-up (US-CW-029) and password reset (US-CW-003).

  Ownership transfer / Owner offboarding is deliberately OUT OF SCOPE here as in EPIC-CW-019: the Owner remains
  non-removable and non-demotable (US-CW-031 AC-06/AC-07 enforce the US-CW-030 AC-03 invariant), and the org
  always has exactly one Owner. A future epic must introduce ownership transfer before an Owner can ever leave.

  Status is DRAFT: authored as specs-only for review. The changes.updates entries above are declared but NOT yet
  applied to the already-APPROVED/IMPLEMENTED US-CW-004 / US-CW-006 records — editing those is an
  implementation-time step for whoever picks this epic up.
