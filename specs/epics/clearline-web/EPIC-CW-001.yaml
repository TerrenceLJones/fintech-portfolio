  updates:
    - story_id: 'US-CW-002'
      story_path: '/specs/user-stories/clearline-web/US-CW-002.yaml'
      title: 'Session & Token Lifecycle'
      change: >
        Removes original AC-04 (preserving an in-progress vendor-payment submission, with its idempotency key,
        across a forced re-authentication). Surfaced while planning this story's implementation: no vendor-payment
        feature exists yet for this epic to build the AC against, and the "New Payment" form and idempotency-key
        handling it presumes belong to US-CW-007 (EPIC-CW-004), not here. Moved rather than dropped — see the
        US-CW-007 update below. Remaining ACs renumbered AC-04–AC-07 to stay contiguous.
    - story_id: 'US-CW-007'
      story_path: '/specs/user-stories/clearline-web/US-CW-007.yaml'
      title: 'Vendor Payment Submission & Idempotency'
      change: >
        Adds AC-06: session expiry mid-submission preserves the in-flight payment form (amount, recipient, memo)
        and idempotency key across a forced re-authentication, then resumes the same submission rather than
        starting a new one. Moved here from US-CW-002 AC-04 (see above) since this story owns the actual payment
        form and idempotency-key mechanics the AC depends on. Adds a dependency on US-CW-002, since the AC layers
        on top of that story's forced-logout/redirect-to-/login mechanism.
  deprecates: []
  removes: []
notes: >
  Establishes the foundational authentication and session management capabilities for clearline-web, covering
  credential-based login, silent token refresh, session expiry, inactivity timeout, security-driven session
  invalidation, and self-service password reset.

  Amended 2026-07-03, while planning US-CW-002's implementation: its original AC-04 (in-flight vendor-payment
  preservation across forced re-auth) had no payment feature in the codebase to build against — EPIC-CW-004's
  US-CW-007 owns the "New Payment" form this AC presumes. Rather than build a standalone form just to host it, or
  implement the underlying mechanism with nothing exercising it end-to-end, the AC moved to US-CW-007 as its own
  AC-06, where it can be implemented against the real form once that story is picked up. Following the precedent
  EPIC-CW-016 set for amending an already-APPROVED epic to close a gap found during implementation of a sibling
  story, rather than opening a new epic for a one-AC relocation.
