epic_id: 'EPIC-CW-021'
title: 'Sidebar Navigation Shell (Top-Nav → Side-Nav Migration)'
app: 'clearline-web'
feature_area: 'core'
status: 'IMPLEMENTED'
approved_date: '2026-07-17'
implementation_date: '2026-07-17'
created_date: '2026-07-16'
source_reference: >
  specs/designs/Clearline Design System - Consolidated.dc.html. Every full product-screen shell in the
  design is drawn as a persistent LEFT SIDEBAR, not the horizontal top bar the app ships today:
  §3.1 "Main navigation & approval queue by role" (the Employee / Finance Manager / Controller / Employee-Admin
  shells) renders a 212px-wide left rail — brand at the top, role-scoped nav items stacked vertically, and a
  user-identity block (avatar initials · name · role/limit) pinned to the bottom via margin-top:auto — with the
  page content in a separate scroll region to its right. The same rail chrome recurs in §9.1 "Dashboard · loaded"
  (the "09 Spend Dashboard (Migrated)" screen explicitly cited as the reference full screen "rebuilt on AppShell")
  and in §18 "Organization & Team Management". The decorators blurb still describes AppShell as owning "the tokens,
  theme and top bar" — that wording is stale relative to the product mockups; this epic reconciles the shipped
  shell to the sidebar the product screens have always specified.
