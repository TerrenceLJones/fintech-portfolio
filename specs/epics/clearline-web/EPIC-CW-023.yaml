notes: >
  Establishes the in-app onboarding layer that begins the moment a user first reaches an authenticated
  page and ends when their role's getting-started tasks are complete or dismissed. It is deliberately
  separated from the existing KYB business-onboarding flow (US-CW-004, the /onboarding/* step routes),
  which provisions the organization and the Owner: that flow answers "is this business allowed to
  transact"; this epic answers "now that you're in, what should you do first." The seam between them
  is exact — KYB approval provisions the Owner (US-CW-030 AC-02) and hands off to their role-appropriate
  home (US-CW-001), where this layer picks up.

  Design decision — the task set is derived from permissions, never from a role string: the launchpad
  asks the same can() predicate US-CW-028 uses to filter the nav, so a persona is only ever offered
  tasks it is actually authorized to perform, and any future change to ROLE_PERMISSIONS re-shapes the
  onboarding for free with no second list to keep in sync. A Controller-only task (issue a virtual
  card, cards:manage — US-CW-014) never appears for a Finance Manager because the predicate that gates
  the nav link gates the onboarding item behind the same permission. This is the whole reason the
  feature is role-based without a role switch statement.

  Design decision — the Owner first-run is a distinct persona, selected by isOwner, not by tier: an
  Owner is provisioned as a Controller (US-CW-030), so a naive permission-only task set would hand the
  Owner the ordinary Controller checklist. But an invited Controller joins an organization that already
  has a team, cards and budgets around them, whereas the Owner arrives out of KYB into an organization
  that is genuinely empty and that only they can populate. isOwner (already on the session, orthogonal
  to the approval ladder, granting only team:view via isAdmin || isOwner) is the input that selects the
  "stand up your workspace" variant — invite the team first, then set a budget, issue the first card,
  read the dashboard — over the "here is your role's first action" variant everyone else receives. This
  mirrors how Ramp / Brex / Mercury treat the workspace creator differently from an invited member, and
  it is the one place the feature reads a flag beyond the permission set.

  Design decision — completion is observed from real domain events, never a manual check-off: an item
  is marked done when the action it names actually happens (an expense is submitted, an approval is
  actioned, a card is issued, a budget is created, a teammate is invited), detected off the same events
  the audit trail already records, so the checklist can never drift from system truth and the user is
  never asked to self-certify work they may not have finished. This is what keeps the launchpad honest
  as "the first action IS the product" rather than a tour that congratulates a click. A single milestone
  celebration fires on the persona's signature first action (US-CW-047); after that the launcher quiets.

  Design decision — anchored to the left rail, not a top bar: the shell has no top bar (the theme
  control was relocated into the rail footer per US-CW-032 / Design §3.1), so the launcher's entry point
  is a pinned "Getting started" row at the foot of the navigation list, directly above the SidebarFooter,
  carrying a slim ProgressBar. It is visually separated from the permanent nav destinations so it can
  disappear on completion without reshuffling navigation, and it opens the checklist as a panel anchored
  off the rail. The dev-only demo Beacon (libs/demo-beacon) is a structurally similar page-aware launcher
  but is gated to dev/demo builds and is explicitly NOT reused here — this is a first-class, production,
  user-facing surface with its own component.

  Design decision — always skippable, re-openable, and dead-end-free: senior finance users (Controllers,
  Finance Managers, Owners) reject mandatory tours, so the launcher is dismissible at any time and never
  blocks a page; a dismissed launcher collapses to the rail entry and can be reopened until its tasks are
  done. Every task deep-links to a real destination and, where that destination's primary list is empty,
  the guidance is delivered through the page's existing EmptyState (Design §9.2) rather than a tour layer,
  so the user never lands on a blank surface with no next action.

  Accessibility: progress is a real ProgressBar (role="progressbar") with an explicit "X of N" text
  label, never conveyed by fill alone; completion and milestone states pair colour with an icon and a
  text label per Design §17 (no meaning by colour alone); the spotlight is keyboard-focusable, dismissible
  with Escape, and does not trap focus.

  IMPLEMENTED 2026-07-23 (branch EPIC-CW-023/getting-started-onboarding). All four stories shipped together:
  US-CW-045 as the permission-keyed task catalogue (apps/clearline-web/src/rbac/onboarding-tasks.ts); US-CW-047
  as a server-side read model (mock-backend OnboardingTasksService, written at the six financial-flow mutation
  call sites) exposed via GET /api/onboarding/tasks in the existing @clearline/data-access-onboarding lib;
  US-CW-044 as the GettingStartedLauncher container fed through a new AppShell `gettingStarted` slot, composing
  net-new @clearline/ui components (GettingStartedRailEntry, GettingStartedPanel — each with .stories.tsx +
  .mdx); US-CW-046 as the SpotlightCoachmark molecule wired on the four action pages with a primary control,
  with view-only destinations completing on arrival and empty pages nudging through their existing EmptyState.
  Two deviations, both noted on their stories: the Owner/Admin invite task points at /settings/team (there is
  no top-level /team route — US-CW-033 relocated it), and three emitters (expense/budget/invite) record
  onboarding completion directly at the mutation rather than via a new audit-log category (a clean fast-follow).
  The dev-only Demo Beacon gained a getting-started guide and a session-preserving "Reset getting-started"
  control; the full "Reset demo data" already wipes the new state via sessionStorage.
