source_reference: >
  Not sourced from clearline-user-stories-gherkin.md — added after a review of the post-activation
  experience found that once a user clears the door (KYB for the Owner in US-CW-030, an accepted
  invite for everyone else in US-CW-031), the app drops them onto their role-appropriate home
  (US-CW-001) with no guidance toward the first action their role actually exists to perform. A
  newly provisioned Owner lands on an empty spend dashboard for an organization with no team, no
  cards, no budgets and no expenses; an Employee lands on an empty My Expenses list. The registry
  has a role-scoped *navigation* model (US-CW-006 / US-CW-028) but nothing that turns "here are the
  pages you can see" into "here is the one thing to do first." This epic adds a role-scoped,
  permission-derived getting-started layer that names the first (and next) meaningful task for each
  persona and guides the user to it on the page where that work happens.
