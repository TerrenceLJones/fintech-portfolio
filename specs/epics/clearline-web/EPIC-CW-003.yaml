      title: 'Component library — organisms & decorators'
      reason: >
        AppShell previously created its own internal ThemeProvider, which would have meant each
        AppShell instance had independent, unsynced theme state and no way to compose theme-dependent
        chrome (like a role-aware nav) without going through AppShell. Corrected AC-05 so ThemeProvider
        is mounted once at the app root and AppShell consumes it, unblocking US-CW-028.
  deprecates: []
  removes: []
notes: >
  Establishes role-based access control for clearline-web, covering role-scoped navigation
  (Employee, Finance Manager, Controller), server-enforced authorization for direct URL access,
  graceful handling of mid-session role changes, per-user approval limit enforcement with
  escalation, and conflict-of-interest prevention for self-approval of expenses.
