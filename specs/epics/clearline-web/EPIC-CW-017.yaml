notes: >
  Establishes how organizations and their members come into existence in Clearline, and who has
  authority to manage that membership — the two questions the registry left unanswered: whether a
  second person can ever join an org another person created, and whether the person who creates an
  org needs elevated authority over it.

  Design decision — invite-only, never self-service association: a user is never able to search for
  or attach themselves to an organization they didn't create. US-CW-031 (Team Management) is the only
  path by which a second person joins an existing org, gated entirely on an existing Owner/Admin
  sending an invite. This mirrors how Ramp, Brex, and Mercury all handle B2B team membership — the
  alternative (self-service join, even domain-matched) is a fraud vector: an attacker who signs up
  with a look-alike or unverified work email could otherwise attach themselves to a real company's
  spend data. A domain-matched "request to join" affordance was considered and deliberately excluded
  from this epic's scope rather than half-built — even that softer version still requires an
  Owner/Admin approval step to be safe, and US-CW-031 already gives Owner/Admin a manual invite path
  that fully covers the only case this project needs (a business owner adding their own team).

  Design decision — Owner is a role, not just "whoever signed up first": the business owner who
  completes KYB (US-CW-004) is assigned Owner on the Organization record at the moment onboarding is
  approved (US-CW-030), for the same reason banking regulators require a designated controlling
  person for BSA/AML purposes — the beneficial-ownership capture US-CW-004 AC-05 already performs for
  KYC is the same natural person this epic ties Owner to. Owner is a per-organization singleton and
  cannot be removed or self-demoted (US-CW-031 explicitly blocks both), only reassigned via an
  ownership-transfer flow — deliberately out of scope for this epic and flagged in US-CW-031's
  technical_notes as a follow-up, since a solo-developer demo has no second Owner-holding scenario to
  build it against yet (the same "don't build a mechanism nothing exercises end-to-end" reasoning
  EPIC-CW-001's notes used to relocate its own AC-04).

  Design decision — Admin is a delegable permission, not a fourth approval tier: US-CW-006's existing
  Employee -> Finance Manager -> Controller ladder is entirely about financial approval authority
  (nav visibility, approval limits, self-approval prevention), and Admin has nothing to do with any of
  that — it's org-administration authority (invite, remove, change roles) that Owner can delegate to
  any teammate regardless of their approval tier. Modeling Admin as a fourth rung above Controller
  would have forced a decision about what approval limit "Admin" carries, which nothing in the
  registry needs answered. This also resolves EPIC-CW-015/US-CW-021's existing "Controller and Admin"
  audit-log-access phrasing without editing either file: both already independently qualify for audit
  access under the roles this epic formalizes, so no change was needed there.
