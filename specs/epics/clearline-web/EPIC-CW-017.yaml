created_date: '2026-07-06'
source_reference: >
  Not sourced from clearline-user-stories-gherkin.md — added post-hoc after a review of how the
  registry models organizations and team membership found no story anywhere that (a) creates an
  Organization record, (b) assigns the business owner who completes KYB any role at all, or (c) lets
  a second person ever join an existing organization. Meanwhile "Admin" is already used as an actor
  in three places — EPIC-CW-015's notes ("log access itself restricted to Controller and Admin
  roles"), US-CW-021 AC-04/AC-06 ("an admin changes a user's role", "only Controller and Admin roles
  may view the audit log"), and US-CW-006 AC-05 ("an admin downgrades my role") — without any story
  ever adding Admin to US-CW-006's enumerated role model (Employee, Finance Manager, Controller).
  This epic closes both gaps together, since the second is unaddressable without first deciding who
  is allowed to invite, remove, or change the role of anyone else.
